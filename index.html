<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-MURAI - Sistem Informasi Gang Perumahan</title>
    
    <!-- External Libraries (CDNs) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <!-- CSS Styles -->
    <style>
        :root {
            /* Color Scheme - Modern Professional */
            --primary-color: #4361ee;
            --primary-light: #6d8bf5;
            --primary-dark: #3a56d4;
            --secondary-color: #7209b7;
            --accent-color: #4cc9f0;
            --success-color: #06d6a0;
            --warning-color: #ffd166;
            --danger-color: #ef476f;
            --light-color: #f8f9fa;
            --dark-color: #1a1a2e;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-300: #dee2e6;
            --gray-400: #ced4da;
            --gray-500: #adb5bd;
            --gray-600: #6c757d;
            --gray-700: #495057;
            --gray-800: #343a40;
            --gray-900: #212529;
            
            /* Border & Shadows */
            --border-radius-sm: 6px;
            --border-radius: 10px;
            --border-radius-lg: 14px;
            --border-radius-xl: 18px;
            --box-shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.05);
            --box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            --box-shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.12);
            --box-shadow-hover: 0 6px 20px rgba(67, 97, 238, 0.15);
            
            /* Spacing */
            --spacing-xs: 3px;
            --spacing-sm: 6px;
            --spacing-md: 10px;
            --spacing-lg: 14px;
            --spacing-xl: 18px;
            --spacing-xxl: 22px;
            
            /* Transitions */
            --transition-fast: 0.2s ease;
            --transition: 0.3s ease;
            --transition-slow: 0.4s ease;
            
            /* Gradients */
            --gradient-primary: linear-gradient(135deg, #4361ee 0%, #3a0ca3 100%);
            --gradient-secondary: linear-gradient(135deg, #7209b7 0%, #560bad 100%);
            --gradient-success: linear-gradient(135deg, #06d6a0 0%, #04a777 100%);
            --gradient-danger: linear-gradient(135deg, #ef476f 0%, #d90429 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7ff 0%, #f0f2ff 100%);
            color: var(--dark-color);
            line-height: 1.5;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-size: 14px;
        }

        .app-container {
            max-width: 100%;
            height: 100vh;
            overflow: hidden;
            position: relative;
            background: var(--light-color);
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        /* Modern Header */
        .app-header {
            background: var(--gradient-primary);
            color: white;
            padding: var(--spacing-md) var(--spacing-lg);
            box-shadow: var(--box-shadow);
            position: relative;
            overflow: hidden;
            z-index: 10;
            min-height: 60px;
            display: flex;
            align-items: center;
        }

        .app-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.1) 50%, transparent 70%);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 1;
            width: 100%;
            flex-wrap: nowrap;
        }

        .header-content h1 {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            letter-spacing: -0.3px;
            white-space: nowrap;
            overflow: visible;
            text-overflow: clip;
            max-width: none;
            padding-right: var(--spacing-sm);
            flex-shrink: 0;
        }

        .header-content h1 i {
            background: rgba(255, 255, 255, 0.2);
            padding: 6px;
            border-radius: 50%;
            backdrop-filter: blur(10px);
            font-size: 0.9rem;
        }

        .refresh-info {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.15);
            padding: 4px 8px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }

        .refresh-info #lastUpdate {
            display: none;
        }

        /* Modern Bottom Navigation */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            background: white;
            padding: var(--spacing-sm) 0;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.08);
            border-radius: var(--border-radius-lg) var(--border-radius-lg) 0 0;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.98);
            min-height: 60px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: var(--gray-600);
            cursor: pointer;
            transition: all var(--transition);
            padding: 6px 8px;
            min-width: 55px;
            border-radius: var(--border-radius);
            position: relative;
            font-size: 0.7rem;
        }

        .nav-item i {
            font-size: 1rem;
            margin-bottom: 3px;
            transition: transform var(--transition);
        }

        .nav-item span {
            font-size: 0.65rem;
            font-weight: 500;
            transition: color var(--transition);
        }

        .nav-item.active {
            color: var(--primary-color);
            background: rgba(67, 97, 238, 0.1);
            transform: translateY(-1px);
        }

        .nav-item.active i {
            transform: scale(1.05);
        }

        .nav-item::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 3px;
            background: var(--primary-color);
            border-radius: 50%;
            opacity: 0;
            transition: opacity var(--transition);
        }

        .nav-item.active::after {
            opacity: 1;
        }

        .nav-item:hover:not(.active) {
            color: var(--primary-light);
            background: rgba(67, 97, 238, 0.05);
        }

        .content {
            flex: 1;
            padding: var(--spacing-md);
            padding-bottom: 70px;
            overflow-y: auto;
            background: linear-gradient(180deg, #f8f9fa 0%, #ffffff 100%);
            -webkit-overflow-scrolling: touch;
        }

        /* Page Transitions */
        .page {
            display: none;
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Modern Page Header */
        .page-header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: var(--spacing-lg);
            padding-bottom: var(--spacing-sm);
            border-bottom: 1px solid rgba(67, 97, 238, 0.1);
            gap: var(--spacing-sm);
        }

        .page-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--dark-color);
            position: relative;
            display: inline-block;
            margin-bottom: 0;
        }

        .page-header h2::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 30px;
            height: 2px;
            background: var(--gradient-primary);
            border-radius: 2px;
        }

        .page-header .btn-group {
            display: flex;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
        }

        .page-header-ronda {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: var(--spacing-lg);
            padding-bottom: var(--spacing-sm);
            border-bottom: 1px solid rgba(67, 97, 238, 0.1);
            gap: var(--spacing-sm);
        }

        /* Modern Cards */
        .card-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--spacing-md);
        }

        .card {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            padding: var(--spacing-md);
            transition: all var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--gradient-primary);
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--box-shadow-hover);
            border-color: var(--primary-light);
        }

        .card-header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: var(--spacing-sm);
            gap: var(--spacing-xs);
        }

        .card-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--dark-color);
            width: 100%;
            margin-right: 0;
        }

        .card-date {
            color: var(--gray-600);
            font-size: 0.75rem;
            background: var(--gray-100);
            padding: 3px 6px;
            border-radius: var(--border-radius-sm);
            font-weight: 500;
            align-self: flex-start;
        }

        .card-content {
            margin-bottom: var(--spacing-sm);
            color: var(--gray-700);
            line-height: 1.6;
            font-size: 0.85rem;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--gray-600);
            font-size: 0.75rem;
            padding-top: var(--spacing-sm);
            border-top: 1px solid var(--gray-200);
        }

        /* Modern Tables */
        .table-container {
            display: block;
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            border: 1px solid var(--gray-200);
            margin-top: var(--spacing-sm);
            font-size: 0.8rem;
        }

        .data-table {
            width: max-content;
            min-width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 0.8rem;
        }

        .data-table thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .data-table th {
            background: var(--gradient-primary);
            color: white;
            font-weight: 600;
            padding: 8px 6px;
            text-align: left;
            border-bottom: 1px solid var(--primary-dark);
            position: relative;
            overflow: hidden;
            font-size: 0.75rem;
            white-space: nowrap;
        }

        .data-table th:first-child {
            border-top-left-radius: var(--border-radius);
        }

        .data-table th:last-child {
            border-top-right-radius: var(--border-radius);
        }

        .data-table td {
            padding: 6px 4px;
            border-bottom: 1px solid var(--gray-200);
            color: var(--gray-700);
            transition: background-color var(--transition-fast);
            font-size: 0.75rem;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .data-table tbody tr {
            transition: all var(--transition-fast);
        }

        .data-table tbody tr:hover {
            background-color: rgba(67, 97, 238, 0.05);
        }

        .data-table tbody tr:last-child td {
            border-bottom: none;
        }

        .data-table tbody tr:last-child td:first-child {
            border-bottom-left-radius: var(--border-radius);
        }

        .data-table tbody tr:last-child td:last-child {
            border-bottom-right-radius: var(--border-radius);
        }

        /* Modern Checkboxes */
        .checkbox-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2px;
        }

        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            border: 1.5px solid var(--gray-400);
            border-radius: 3px;
            transition: all var(--transition-fast);
            position: relative;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-color: white;
        }

        input[type="checkbox"]:checked {
            background-color: var(--success-color);
            border-color: var(--success-color);
            transform: scale(1.05);
        }

        input[type="checkbox"]:checked::before {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 10px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        input[type="checkbox"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Modern Buttons */
        .btn {
            padding: 6px 10px;
            border: none;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-size: 0.8rem;
            letter-spacing: 0.2px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
        }

        .btn:hover::before {
            width: 200px;
            height: 200px;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.25);
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--primary-color);
            color: var(--primary-color);
        }

        .btn-outline:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.2);
        }

        .btn-danger {
            background: var(--gradient-danger);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(239, 71, 111, 0.25);
        }

        .btn-small {
            padding: 4px 8px;
            font-size: 0.7rem;
            border-radius: var(--border-radius-sm);
        }

        .btn-group {
            display: flex;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
        }

        /* Modern Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
        }

        .stat-card {
            background: white;
            padding: var(--spacing-md);
            border-radius: var(--border-radius);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            box-shadow: var(--box-shadow);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-primary);
        }

        .stat-card.total::before { background: var(--gradient-primary); }
        .stat-card.income::before { background: var(--gradient-success); }
        .stat-card.expense::before { background: var(--gradient-danger); }

        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--box-shadow); }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--border-radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .total .stat-icon {
            background: linear-gradient(135deg, rgba(67, 97, 238, 0.1) 0%, rgba(58, 12, 163, 0.1) 100%);
            color: var(--primary-color);
        }

        .income .stat-icon {
            background: linear-gradient(135deg, rgba(6, 214, 160, 0.1) 0%, rgba(4, 167, 119, 0.1) 100%);
            color: var(--success-color);
        }

        .expense .stat-icon {
            background: linear-gradient(135deg, rgba(239, 71, 111, 0.1) 0%, rgba(217, 4, 41, 0.1) 100%);
            color: var(--danger-color);
        }

        .stat-info {
            flex: 1;
            min-width: 0;
        }

        .stat-info span {
            font-size: 0.7rem;
            color: var(--gray-600);
            display: block;
            margin-bottom: 2px;
            font-weight: 500;
        }

        .stat-info h3 {
            font-size: 0.95rem;
            font-weight: 700;
            margin: 0;
            color: var(--dark-color);
            line-height: 1.2;
        }

        /* Modern Accordion */
        .month-accordion {
            background: white;
            border-radius: var(--border-radius);
            margin-bottom: var(--spacing-sm);
            overflow: hidden;
            box-shadow: var(--box-shadow);
            border: 1px solid var(--gray-200);
            transition: all var(--transition);
        }

        .month-accordion:hover { box-shadow: var(--box-shadow); }

        .accordion-header {
            padding: var(--spacing-md);
            background: white;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            border-bottom: 1px solid transparent;
            transition: all var(--transition);
            flex-wrap: wrap;
        }

        .month-accordion.active .accordion-header {
            border-bottom-color: var(--gray-200);
            background: rgba(67, 97, 238, 0.02);
        }

        .accordion-content {
            padding: 0;
            max-height: 0;
            overflow: hidden;
            transition: max-height var(--transition-slow) ease-out;
        }

        .month-accordion.active .accordion-content {
            max-height: 2000px;
            padding: var(--spacing-md);
        }

        .acc-left {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-weight: 600;
            color: var(--dark-color);
            font-size: 0.9rem;
            flex: 1;
            min-width: 0;
        }

        .acc-left i { color: var(--primary-color); font-size: 0.9rem; }

        .acc-right {
            display: flex;
            align-items: center;
            text-align: right;
            gap: var(--spacing-xs);
            flex-shrink: 0;
        }

        .value-saldo-header {
            font-size: 0.9rem;
            color: var(--primary-color);
            font-weight: 700;
        }

        .fa-chevron-down {
            transition: transform var(--transition);
            color: var(--gray-500);
            font-size: 0.8rem;
        }

        .month-accordion.active .fa-chevron-down {
            transform: rotate(180deg);
            color: var(--primary-color);
        }

        /* Modern Badges */
        .badge {
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 600;
            display: inline-block;
            letter-spacing: 0.2px;
        }

        .badge-in {
            background: linear-gradient(135deg, rgba(6, 214, 160, 0.1) 0%, rgba(4, 167, 119, 0.1) 100%);
            color: var(--success-color);
            border: 1px solid rgba(6, 214, 160, 0.2);
        }

        .badge-out {
            background: linear-gradient(135deg, rgba(239, 71, 111, 0.1) 0%, rgba(217, 4, 41, 0.1) 100%);
            color: var(--danger-color);
            border: 1px solid rgba(239, 71, 111, 0.2);
        }

        /* Modern Ronda Visualization */
        .ronda-visual-container {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
            padding: var(--spacing-sm);
        }

        .ronda-item {
            background: white;
            padding: var(--spacing-md);
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            border: 1px solid var(--gray-200);
            transition: all var(--transition);
        }

        .ronda-item:hover { transform: translateY(-1px); box-shadow: var(--box-shadow); }

        .ronda-item.status-ronda {
            border-left: 3px solid var(--success-color);
            background: linear-gradient(90deg, rgba(6, 214, 160, 0.05) 0%, white 100%);
        }

        .ronda-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-sm);
            flex-wrap: wrap;
            gap: var(--spacing-xs);
        }

        .ronda-name {
            font-weight: 700;
            color: var(--dark-color);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .ronda-name::before { content: '👤'; font-size: 0.8em; }

        .ronda-days {
            font-size: 0.75rem;
            color: var(--gray-600);
            background: var(--gray-100);
            padding: 2px 6px;
            border-radius: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .ronda-bar-bg {
            width: 100%;
            height: 28px;
            background: linear-gradient(90deg, var(--gray-100) 0%, var(--gray-200) 100%);
            border-radius: 14px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--gray-300);
        }

        .ronda-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color) 0%, var(--primary-light) 100%);
            border-radius: 14px;
            transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .ronda-bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.2) 50%, transparent 100%);
            animation: shine 2s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .status-ronda .ronda-bar-fill {
            background: linear-gradient(90deg, var(--success-color) 0%, #07c697 100%);
        }

        .ronda-bar-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 600;
            color: white;
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.2);
            z-index: 2;
            pointer-events: none;
            letter-spacing: 0.3px;
            padding: 0 8px;
            text-align: center;
            line-height: 1.2;
        }

        /* Loading Indicator */
        .loading-indicator {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(3px);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(67, 97, 238, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Utility */
        .hidden { display: none !important; }
        .text-center { text-align: center !important; }
        .text-right { text-align: right !important; }
        .text-left { text-align: left !important; }
        .text-primary { color: var(--primary-color) !important; }
        .text-success { color: var(--success-color) !important; }
        .text-danger { color: var(--danger-color) !important; }
        .text-warning { color: var(--warning-color) !important; }

        .total-row {
            background-color: rgba(6, 214, 160, 0.15) !important;
            font-weight: 700 !important;
            border-top: 2px solid var(--success-color) !important;
        }
        
        .total-row td { padding: 10px 6px !important; font-weight: 700 !important; }
        .total-row .text-success { color: var(--success-color) !important; }
        .total-row .text-danger { color: var(--danger-color) !important; }
        .total-row .saldo-kumulatif {
            background-color: rgba(6, 214, 160, 0.3) !important;
            border-radius: 4px;
            padding: 4px 8px !important;
        }

        /* Toast Notification Style */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .toast {
            min-width: 250px;
            background: white;
            color: var(--dark-color);
            padding: 12px 16px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow-lg);
            border-left: 4px solid var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slideIn 0.3s ease-out forwards;
            font-size: 0.9rem;
        }
        
        .toast.success { border-left-color: var(--success-color); }
        .toast.error { border-left-color: var(--danger-color); }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .pengumuman-header {
                padding: 12px;
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .pengumuman-toggle { align-self: flex-end; }
        }

        @media (min-width: 768px) {
            body { font-size: 15px; }
            .app-header { padding: var(--spacing-lg) var(--spacing-xl); min-height: 70px; }
            .header-content h1 { font-size: 1.4rem; }
            .refresh-info { font-size: 0.85rem; padding: 6px 12px; }
            .refresh-info #lastUpdate { display: inline; }
            .content { padding: var(--spacing-xl); padding-bottom: 90px; }
            .bottom-nav {
                max-width: 500px;
                left: 50%;
                transform: translateX(-50%);
                border-radius: var(--border-radius-xl) var(--border-radius-xl) 0 0;
                padding: var(--spacing-sm) var(--spacing-xl);
            }
            .nav-item { min-width: 70px; padding: 8px 12px; font-size: 0.75rem; }
            .nav-item i { font-size: 1.2rem; }
            .page-header { flex-direction: row; align-items: center; justify-content: space-between; }
            .card-container { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
            .stats-grid { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
        }

        @media (min-width: 992px) {
            body { font-size: 16px; }
            .app-container { max-width: 1200px; margin: 0 auto; box-shadow: 0 0 30px rgba(0, 0, 0, 0.1); }
            .bottom-nav { max-width: 600px; }
        }
    </style>
</head>
<body>
    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <div class="app-container">
        <!-- Main App Screen -->
        <div id="mainScreen" class="screen">
            <header class="app-header">
                <div class="header-content">
                    <div class="logo-section">
                        <h1><i class="fas fa-home"></i> E-MURAI</h1>
                        <p class="app-subtitle">System Management Gang Murai</p>
                    </div>
                    <div class="refresh-info">
                        <span id="lastUpdate">Last update: -</span>
                        <button id="refreshBtn" class="btn btn-small">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                    </div>
                </div>
            </header>

            <nav class="bottom-nav">
                <button class="nav-item active" data-page="pengumuman">
                    <i class="fas fa-bullhorn"></i>
                    <span>Pengumuman</span>
                </button>
                <button class="nav-item" data-page="iuran">
                    <i class="fas fa-money-bill-wave"></i>
                    <span>Iuran Bulanan</span>
                </button>
                <button class="nav-item" data-page="kas">
                    <i class="fas fa-wallet"></i>
                    <span>Uang Kas</span>
                </button>
                <button class="nav-item" data-page="ronda">
                    <i class="fas fa-shield-alt"></i>
                    <span>Jadwal Ronda</span>
                </button>
            </nav>

            <main class="content">
                <!-- Pengumuman Page -->
                <div id="pengumumanPage" class="page active">
                    <div class="page-header">
                        <h2>Pengumuman</h2>
                    </div>
                    <div id="pengumumanList" class="card-container"></div>
                </div>

                <!-- Iuran Bulanan Page -->
                <div id="iuranPage" class="page">
                    <div class="page-header">
                        <h2>Iuran Bulanan 2026</h2>
                    </div>
                    <div class="table-container">
                        <table id="iuranTable" class="data-table"></table>
                    </div>
                </div>

                <!-- Uang Kas Page -->
                <div id="kasPage" class="page">
                    <div class="page-header">
                        <h2>Dashboard Keuangan</h2>
                        <div class="btn-group">
                            <button onclick="exportToExcel()" class="btn btn-outline btn-small">
                                <i class="fas fa-file-excel"></i> Excel
                            </button>
                            <button onclick="exportToPDF()" class="btn btn-danger btn-small">
                                <i class="fas fa-file-pdf"></i> PDF
                            </button>
                        </div>
                    </div>
                
                    <div class="stats-grid">
                        <div class="stat-card total">
                            <div class="stat-icon"><i class="fas fa-wallet"></i></div>
                            <div class="stat-info">
                                <span>Total Saldo</span>
                                <h3 id="statTotalSaldo">Rp 0</h3>
                            </div>
                        </div>
                        <div class="stat-card income">
                            <div class="stat-icon"><i class="fas fa-arrow-down"></i></div>
                            <div class="stat-info">
                                <span>Masuk (Bulan Ini)</span>
                                <h3 id="statTotalMasuk">Rp 0</h3>
                            </div>
                        </div>
                        <div class="stat-card expense">
                            <div class="stat-icon"><i class="fas fa-arrow-up"></i></div>
                            <div class="stat-info">
                                <span>Keluar (Bulan Ini)</span>
                                <h3 id="statTotalKeluar">Rp 0</h3>
                            </div>
                        </div>
                    </div>
                
                    <div id="kasContainer"></div>
                </div>

                <!-- Jadwal Ronda Page -->
                <div id="rondaPage" class="page">
                    <div class="page-header-ronda">
                        <h2>Jadwal Ronda</h2>
                        <button onclick="exportRondaPDF()" class="btn btn-danger btn-small">
                            <i class="fas fa-file-pdf"></i>Download PDF
                        </button>
                    </div>
                    <div class="table-container"></div>
                </div>
            </main>
        </div>
    </div>

    <!-- Loading indicator -->
    <div id="loadingIndicator" class="loading-indicator hidden">
        <div class="spinner"></div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // Global variables
        const csvUrls = {
            pengumuman: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRhtHQT_YmSq-tiQt-6Kqj5Ms9oeUdTdiNIChEdQPgEQryYxTMf2M5RTgpVa1oi30rvvXrJK3XY4nyd/pub?gid=0&single=true&output=csv',
            iuran: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRhtHQT_YmSq-tiQt-6Kqj5Ms9oeUdTdiNIChEdQPgEQryYxTMf2M5RTgpVa1oi30rvvXrJK3XY4nyd/pub?gid=1650144415&single=true&output=csv',
            kas: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRhtHQT_YmSq-tiQt-6Kqj5Ms9oeUdTdiNIChEdQPgEQryYxTMf2M5RTgpVa1oi30rvvXrJK3XY4nyd/pub?gid=2139823991&single=true&output=csv',
            ronda: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRhtHQT_YmSq-tiQt-6Kqj5Ms9oeUdTdiNIChEdQPgEQryYxTMf2M5RTgpVa1oi30rvvXrJK3XY4nyd/pub?gid=2068778061&single=true&output=csv'
        };

        let rawKasData = []; 
        let rawRondaData = [];
        let kasDataForChart = []; 

        // DOM elements
        const refreshBtn = document.getElementById('refreshBtn');
        const lastUpdate = document.getElementById('lastUpdate');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const navItems = document.querySelectorAll('.nav-item');
        const pages = document.querySelectorAll('.page');

        // Containers
        const pengumumanList = document.getElementById('pengumumanList');
        const iuranTable = document.getElementById('iuranTable');
        const kasContainer = document.getElementById('kasContainer');

        document.addEventListener('DOMContentLoaded', () => {
            refreshBtn.addEventListener('click', refreshAllData);
            navItems.forEach(item => {
                item.addEventListener('click', () => switchPage(item.getAttribute('data-page')));
            });
            loadInitialData();
            setInterval(refreshAllData, 5 * 60 * 1000);
        });

        // Fungsi Toast Notification
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span>${message}</span>
                <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i>
            `;
            container.appendChild(toast);
            
            // Hapus toast setelah 3 detik
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s ease-out forwards';
                toast.addEventListener('animationend', () => {
                    toast.remove();
                });
            }, 3000);
        }

        function switchPage(pageName) {
            navItems.forEach(item => item.classList.toggle('active', item.getAttribute('data-page') === pageName));
            pages.forEach(page => page.classList.toggle('active', page.id === `${pageName}Page`));
            loadPageData(pageName);
        }

        function loadInitialData() { refreshAllData(); }

        function refreshAllData() {
            const activePageElement = document.querySelector('.page.active');
            if (activePageElement) {
                const activePage = activePageElement.id.replace('Page', '');
                loadPageData(activePage);
            }
        }

        function loadPageData(pageName) {
            showLoading(true);
            switch (pageName) {
                case 'pengumuman': loadPengumuman(); break;
                case 'iuran': loadIuranBulanan(); break;
                case 'kas': loadUangKas(); break;
                case 'ronda': loadJadwalRonda(); break;
            }
        }

        function fetchAndParseCSV(url) {
            const buster = `${url}&t=${new Date().getTime()}`;
            return new Promise((resolve, reject) => {
                fetch(buster)
                    .then(res => res.text())
                    .then(csvText => {
                        const results = Papa.parse(csvText, { header: false, skipEmptyLines: true });
                        resolve(results.data);
                    })
                    .catch(err => reject(err));
            });
        }

        function showLoading(show) {
            if (loadingIndicator) loadingIndicator.classList.toggle('hidden', !show);
        }

        function updateLastUpdateTime() {
            if (lastUpdate) lastUpdate.textContent = `Update: ${moment().format('HH:mm')}`;
        }

        function formatNumber(n) { 
            return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); 
        }

        function formatTextWithBreaks(text) {
            if (!text) return '';
            return text.toString().replace(/\n/g, '<br>');
        }

        function truncateText(text, maxLength = 100) {
            if (!text) return '';
            if (text.length <= maxLength) return text;
            return text.substring(0, maxLength) + '...';
        }

        // ---------------------------------------------------------
        // 1. PENGUMUMAN
        // ---------------------------------------------------------
        function loadPengumuman() {
            fetchAndParseCSV(csvUrls.pengumuman)
                .then(data => {
                    pengumumanList.innerHTML = '';
                    if (data.length <= 1) { 
                        pengumumanList.innerHTML = '<p class="text-center">Tidak ada pengumuman.</p>'; 
                        return; 
                    }
                    
                    for (let i = 1; i < data.length; i++) {
                        const [id, tgl, judul, isi, pengirim] = data[i];
                        const isiFormatted = formatTextWithBreaks(isi);
                        
                        const card = document.createElement('div');
                        card.className = 'card pengumuman-card';
                        card.innerHTML = `
                            <div class="card-header pengumuman-header" onclick="togglePengumuman(this)">
                                <div class="pengumuman-header-content">
                                    <h3 class="card-title">${judul || 'Tanpa Judul'}</h3>
                                    <span class="card-date">${moment(tgl).format('DD/MM/YY')}</span>
                                </div>
                                <i class="fas fa-chevron-down pengumuman-toggle"></i>
                            </div>
                            <div class="card-content pengumuman-content" style="display: none;">
                                <div class="pengumuman-isi">${isiFormatted}</div>
                            </div>
                            <div class="card-footer">
                                <span>Oleh: ${pengirim || 'Admin'}</span>
                            </div>`;
                        pengumumanList.appendChild(card);
                    }
                    updateLastUpdateTime();
                })
                .finally(() => showLoading(false));
        }

        function togglePengumuman(headerElement) {
            const card = headerElement.closest('.pengumuman-card');
            const content = card.querySelector('.pengumuman-content');
            const toggleIcon = headerElement.querySelector('.pengumuman-toggle');
            
            document.querySelectorAll('.pengumuman-card').forEach(otherCard => {
                if (otherCard !== card) {
                    const otherContent = otherCard.querySelector('.pengumuman-content');
                    const otherIcon = otherCard.querySelector('.pengumuman-toggle');
                    if (otherContent) otherContent.style.display = 'none';
                    if (otherIcon) {
                        otherIcon.classList.remove('fa-chevron-up');
                        otherIcon.classList.add('fa-chevron-down');
                    }
                }
            });
            
            if (content.style.display === 'none') {
                content.style.display = 'block';
                toggleIcon.classList.remove('fa-chevron-down');
                toggleIcon.classList.add('fa-chevron-up');
            } else {
                content.style.display = 'none';
                toggleIcon.classList.remove('fa-chevron-up');
                toggleIcon.classList.add('fa-chevron-down');
            }
        }

        // ---------------------------------------------------------
        // 2. IURAN BULANAN
        // ---------------------------------------------------------
        function loadIuranBulanan() {
            fetchAndParseCSV(csvUrls.iuran)
                .then(data => {
                    if (data.length === 0) return;
                    const headers = data[0];
                    let html = `<thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>`;
                    
                    for (let i = 1; i < data.length; i++) {
                        if (!data[i][0]) continue;
                        html += '<tr>';
                        for (let j = 0; j < headers.length; j++) {
                            const val = (data[i][j] || "").toString().trim().toUpperCase();
                            if (val === 'TRUE' || val === 'FALSE') {
                                html += `<td class="text-center">
                                    <div class="checkbox-container">
                                        <input type="checkbox" ${val === 'TRUE' ? 'checked' : ''} disabled>
                                    </div>
                                </td>`;
                            } else {
                                html += `<td>${data[i][j] || '-'}</td>`;
                            }
                        }
                        html += '</tr>';
                    }
                    iuranTable.innerHTML = html + '</tbody>';
                    updateLastUpdateTime();
                })
                .finally(() => showLoading(false));
        }

        // ---------------------------------------------------------
        // 3. UANG KAS (DASHBOARD & LAPORAN)
        // ---------------------------------------------------------
        function loadUangKas() {
            fetchAndParseCSV(csvUrls.kas)
                .then(data => {
                    rawKasData = data; 
                    renderUangKas(data);
                    updateLastUpdateTime();
                })
                .finally(() => showLoading(false));
        }

        function renderUangKas(data) {
            kasContainer.innerHTML = '';
            if (!data || data.length <= 1) {
                kasContainer.innerHTML = '<p class="text-center">Data kas tidak ditemukan.</p>';
                return;
            }

            const bulanData = {};
            
            for (let i = 1; i < data.length; i++) {
                const row = data[i];
                if (!row[1]) continue;
                
                const masuk = parseInt(row[4]?.toString().replace(/[^0-9]/g, "")) || 0;
                const keluar = parseInt(row[5]?.toString().replace(/[^0-9]/g, "")) || 0;
                const saldoTransaksi = masuk - keluar;
                
                const transaksi = {
                    bulan: row[1],
                    tgl: row[2],
                    ket: row[3],
                    masuk,
                    keluar,
                    saldoTransaksi
                };
                
                if (!bulanData[row[1]]) {
                    bulanData[row[1]] = {
                        namaBulan: row[1],
                        transaksi: [],
                        totalMasuk: 0,
                        totalKeluar: 0,
                        saldoBulan: 0
                    };
                }
                
                bulanData[row[1]].transaksi.push(transaksi);
                bulanData[row[1]].totalMasuk += masuk;
                bulanData[row[1]].totalKeluar += keluar;
                bulanData[row[1]].saldoBulan += saldoTransaksi;
            }
            
            const urutanBulan = {
                'Januari': 1, 'Februari': 2, 'Maret': 3, 'April': 4, 'Mei': 5, 'Juni': 6,
                'Juli': 7, 'Agustus': 8, 'September': 9, 'Oktober': 10, 'November': 11, 'Desember': 12
            };
            
            const sortedBulanKeys = Object.keys(bulanData).sort((a, b) => urutanBulan[a] - urutanBulan[b]);
            
            let saldoKumulatifHinggaSekarang = 0;
            const bulanDenganSaldoKumulatif = [];
            kasDataForChart = [];
            
            for (const bulanKey of sortedBulanKeys) {
                const bulan = bulanData[bulanKey];
                saldoKumulatifHinggaSekarang += bulan.saldoBulan;
                
                bulanDenganSaldoKumulatif.push({
                    ...bulan,
                    saldoKumulatif: saldoKumulatifHinggaSekarang
                });
                
                kasDataForChart.push({
                    bulan: bulanKey,
                    pemasukan: bulan.totalMasuk,
                    pengeluaran: bulan.totalKeluar,
                    saldoKumulatif: saldoKumulatifHinggaSekarang
                });
            }
            
            const bulanTerbaru = sortedBulanKeys[sortedBulanKeys.length - 1];
            const currentMonthIn = bulanTerbaru ? bulanData[bulanTerbaru].totalMasuk : 0;
            const currentMonthOut = bulanTerbaru ? bulanData[bulanTerbaru].totalKeluar : 0;
            
            document.getElementById('statTotalSaldo').innerText = `Rp ${formatNumber(saldoKumulatifHinggaSekarang)}`;
            document.getElementById('statTotalMasuk').innerText = `Rp ${formatNumber(currentMonthIn)}`;
            document.getElementById('statTotalKeluar').innerText = `Rp ${formatNumber(currentMonthOut)}`;
            
            const saldoSebelumBulan = {};
            let saldoSebelum = 0;
            
            for (const bulanKey of sortedBulanKeys) {
                saldoSebelumBulan[bulanKey] = saldoSebelum;
                saldoSebelum += bulanData[bulanKey].saldoBulan;
            }
            
            bulanDenganSaldoKumulatif.reverse().forEach((bulanDataItem, idx) => {
                let saldoBerjalan = saldoSebelumBulan[bulanDataItem.namaBulan];
                
                const rowsHtml = bulanDataItem.transaksi.map(item => {
                    saldoBerjalan += (item.masuk - item.keluar);
                    
                    return `
                        <tr>
                            <td>${item.tgl}</td>
                            <td>${item.ket}</td>
                            <td><span class="badge ${item.masuk > 0 ? 'badge-in' : ''}">${item.masuk > 0 ? '+' + formatNumber(item.masuk) : '-'}</span></td>
                            <td><span class="badge ${item.keluar > 0 ? 'badge-out' : ''}">${item.keluar > 0 ? '-' + formatNumber(item.keluar) : '-'}</span></td>
                            <td class="text-right"><strong>${formatNumber(saldoBerjalan)}</strong></td>
                        </tr>`;
                }).join('');
                
                const totalBulanHtml = `
                    <tr class="total-row">
                        <td colspan="2" class="font-weight-bold text-right">TOTAL ${bulanDataItem.namaBulan.toUpperCase()}:</td>
                        <td class="font-weight-bold text-success">+${formatNumber(bulanDataItem.totalMasuk)}</td>
                        <td class="font-weight-bold text-danger">-${formatNumber(bulanDataItem.totalKeluar)}</td>
                        <td class="font-weight-bold text-right saldo-kumulatif">Rp ${formatNumber(bulanDataItem.saldoKumulatif)}</td>
                    </tr>
                `;

                const netBulan = bulanDataItem.saldoBulan; 
                const isPlus = netBulan >= 0;
                const warnaTeks = isPlus ? 'var(--success-color)' : 'var(--danger-color)';
                const tanda = isPlus ? '+' : '-';

                const accDiv = document.createElement('div');
                accDiv.className = `month-accordion ${idx === 0 ? 'active' : ''}`;
                
                accDiv.innerHTML = `
                    <div class="accordion-header" onclick="toggleKasAccordion(this)">
                        <div class="acc-left">
                            <i class="fas fa-calendar-check"></i>

        // ---------------------------------------------------------
        // UPGRADED PDF EXPORT FUNCTION
        // Grafik dipindahkan ke halaman terakhir (beda page dengan table)
        // Header table font putih
        // ---------------------------------------------------------
        async function exportToPDF() {
            if (rawKasData.length <= 1) return showToast("Data kas belum terisi!", "error");
            showLoading(true);
            
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('p', 'mm', 'a4');
                
                // 1. SETUP HEADER DOKUMEN
                doc.setFontSize(20);
                doc.setFont(undefined, 'bold');
                doc.setTextColor(0, 0, 0);
                doc.text("LAPORAN KAS E-MURAI", 105, 20, { align: 'center' });
                
                doc.setFontSize(12);
                doc.setFont(undefined, 'normal');
                doc.text(`System Management Gang Murai - Periode: ${moment().format('DD MMMM YYYY')}`, 105, 28, { align: 'center' });
                
                const grouped = {};
                for (let i = 1; i < rawKasData.length; i++) {
                    const bulan = rawKasData[i][1];
                    if (!grouped[bulan]) grouped[bulan] = [];
                    grouped[bulan].push(rawKasData[i]);
                }
                
                const urutanBulan = {
                    'Januari': 1, 'Februari': 2, 'Maret': 3, 'April': 4, 'Mei': 5, 'Juni': 6,
                    'Juli': 7, 'Agustus': 8, 'September': 9, 'Oktober': 10, 'November': 11, 'Desember': 12
                };
                
                const sortedMonths = Object.keys(grouped).sort((a, b) => urutanBulan[a] - urutanBulan[b]);
                const pageWidth = doc.internal.pageSize.width;
                const margin = 20;
                const contentWidth = pageWidth - (2 * margin);
                const totalColumns = 5;
                const equalColumnWidth = contentWidth / totalColumns - 5;

                // 2. PERSIAPAN DATA GRAFIK
                const chartData = {
                    labels: [],
                    pemasukan: [],
                    pengeluaran: [],
                    saldo: [],
                    net: []
                };

                let tempGlobalBalance = 0;

                for (const bulan of sortedMonths) {
                    const rows = grouped[bulan];
                    let totalMasuk = 0;
                    let totalKeluar = 0;
                    
                    for (const r of rows) {
                        const vIn = parseInt(r[4]?.toString().replace(/[^0-9]/g, "")) || 0;
                        const vOut = parseInt(r[5]?.toString().replace(/[^0-9]/g, "")) || 0;
                        totalMasuk += vIn;
                        totalKeluar += vOut;
                    }

                    const netBulan = totalMasuk - totalKeluar;
                    tempGlobalBalance += netBulan;
                    
                    chartData.labels.push(bulan);
                    chartData.pemasukan.push(totalMasuk);
                    chartData.pengeluaran.push(totalKeluar);
                    chartData.saldo.push(tempGlobalBalance);
                    chartData.net.push(netBulan);
                }

                // Hapus data pertama (Januari) untuk GRAFIK saja (sesuai request awal untuk analisis mulai bulan berikutnya)
                // Namun TABLE tetap menampilkan semua data termasuk Januari
                if (chartData.labels.length > 0) {
                    chartData.labels.shift();      
                    chartData.pemasukan.shift();   
                    chartData.pengeluaran.shift(); 
                    chartData.saldo.shift();      
                    chartData.net.shift();        
                }

                // 3. RENDER TABEL DATA (PAGE 1 - N)
                // Dicetak terlebih dahulu sebelum grafik
                let globalBalance = 0; 
                
                for (const bulan of sortedMonths) {
                    const rows = grouped[bulan];
                    let totalMasuk = 0;
                    let totalKeluar = 0;
                    
                    const rowData = rows.map(r => {
                        const vIn = parseInt(r[4]?.toString().replace(/[^0-9]/g, "")) || 0;
                        const vOut = parseInt(r[5]?.toString().replace(/[^0-9]/g, "")) || 0;
                        totalMasuk += vIn;
                        totalKeluar += vOut;
                        const saldoSebelum = globalBalance;
                        globalBalance += (vIn - vOut);
                        return {
                            tgl: r[2],
                            ket: r[3],
                            masuk: vIn,
                            keluar: vOut,
                            saldo: saldoSebelum + (vIn - vOut)
                        };
                    });
                    
                    // Cek page break
                    let currentY = doc.lastAutoTable ? doc.lastAutoTable.finalY + 10 : 40;
                    if (currentY > 240) {
                        doc.addPage();
                        currentY = 20;
                    }
                    
                    doc.setFontSize(14);
                    doc.setFont(undefined, 'bold');
                    doc.setTextColor(0, 0, 0);
                    doc.text(`Rincian Bulan: ${bulan}`, margin, currentY);
                    currentY += 8;
                    
                    const tableData = rowData.map(r => [
                        r.tgl,
                        r.ket,
                        formatNumber(r.masuk),
                        formatNumber(r.keluar),
                        formatNumber(r.saldo)
                    ]);
                    
                    tableData.push([
                        '',
                        `TOTAL ${bulan.toUpperCase()}:`,
                        formatNumber(totalMasuk),
                        formatNumber(totalKeluar),
                        formatNumber(globalBalance)
                    ]);
                    
                    // KONFIGURASI TABEL DENGAN HEADER PUTIH
                    doc.autoTable({
                        startY: currentY,
                        head: [['Tanggal', 'Keterangan', 'Masuk', 'Keluar', 'Saldo Kumulatif']],
                        body: tableData,
                        theme: 'grid',
                        headStyles: { 
                            fillColor: [67, 97, 238], // Biru background
                            textColor: [255, 255, 255], // PUTIH (Sesuai Request)
                            fontSize: 9,
                            halign: 'center',
                            fontStyle: 'bold'
                        },
                        bodyStyles: { 
                            fontSize: 8,
                            cellPadding: 3,
                            overflow: 'linebreak',
                            textColor: [0, 0, 0],
                            fontStyle: 'normal'
                        },
                        columnStyles: {
                            0: { cellWidth: equalColumnWidth, halign: 'center', minCellWidth: equalColumnWidth - 2, textColor: [0, 0, 0] },
                            1: { cellWidth: equalColumnWidth + 10, minCellWidth: equalColumnWidth, textColor: [0, 0, 0] },
                            2: { cellWidth: equalColumnWidth, halign: 'right', minCellWidth: equalColumnWidth - 2, textColor: [0, 0, 0] },
                            3: { cellWidth: equalColumnWidth, halign: 'right', minCellWidth: equalColumnWidth - 2, textColor: [0, 0, 0] },
                            4: { cellWidth: equalColumnWidth, halign: 'right', minCellWidth: equalColumnWidth - 2, textColor: [0, 0, 0] }
                        },
                        margin: { left: margin, right: margin },
                        willDrawCell: function(data) {
                            if (data.row.index === tableData.length - 1) {
                                doc.setFillColor(230, 255, 247);
                                doc.rect(data.cell.x, data.cell.y, data.cell.width, data.cell.height, 'F');
                                doc.setDrawColor(6, 214, 160);
                                doc.setLineWidth(0.5);
                                doc.line(data.cell.x, data.cell.y, data.cell.x + data.cell.width, data.cell.y);
                                doc.setFont(undefined, 'bold');
                                doc.setTextColor(0, 0, 0);
                                if (data.column.index === 4) {
                                    doc.setFillColor(200, 250, 237);
                                    doc.roundedRect(data.cell.x + 1, data.cell.y + 1, data.cell.width - 2, data.cell.height - 2, 2, 2, 'F');
                                }
                            } else {
                                doc.setTextColor(0, 0, 0);
                            }
                        },
                        didParseCell: function(data) {

                                data.cell.styles.textColor = [0, 0, 0];
                                data.cell.styles.fontStyle = 'bold';
                            }
                        }
                    });
                }

                // 4. RINGKASAN AKHIR (SEBELUM GRAFIK)
                let finalY = doc.lastAutoTable ? doc.lastAutoTable.finalY + 10 : 40;
                if (finalY > 220) {
                    doc.addPage();
                    finalY = 20;
                }

                // Hitung total ulang untuk summary
                const totalPemasukan = chartData.pemasukan.reduce((a, b) => a + b, 0);
                const totalPengeluaran = chartData.pengeluaran.reduce((a, b) => a + b, 0);
                // Kembalikan data bulan pertama (Januari) ke total summary agar akurat
                const firstMonth = sortedMonths[0]; 
                const firstMonthRows = grouped[firstMonth] || [];
                let firstMonthIn = 0, firstMonthOut = 0;
                firstMonthRows.forEach(r => {
                    firstMonthIn += parseInt(r[4]?.toString().replace(/[^0-9]/g, "")) || 0;
                    firstMonthOut += parseInt(r[5]?.toString().replace(/[^0-9]/g, "")) || 0;
                });
                
                const grandTotalIn = totalPemasukan + firstMonthIn;
                const grandTotalOut = totalPengeluaran + firstMonthOut;
                const grandBalance = globalBalance;

                finalY += 10;
                doc.setFontSize(12);
                doc.setFont(undefined, 'bold');
                doc.setTextColor(0, 0, 0);
                doc.text("RINGKASAN KESELURUHAN", margin, finalY);
                finalY += 8;
                
                doc.setFont(undefined, 'normal');
                doc.setFontSize(10);
                
                const summaryWidth = contentWidth;
                const summaryHeight = 25;
                
                doc.setFillColor(245, 245, 245);
                doc.rect(margin, finalY, summaryWidth, summaryHeight, 'F');
                doc.setDrawColor(200, 200, 200);
                doc.setLineWidth(0.3);
                doc.rect(margin, finalY, summaryWidth, summaryHeight);
                
                const col1 = margin + 10;
                const col2 = margin + summaryWidth / 2;

                doc.text(`Total Pemasukan: Rp ${formatNumber(grandTotalIn)}`, col1, finalY + 8);

                doc.setFont(undefined, 'bold');
                doc.setFontSize(11);
                doc.text(`Saldo Akhir: Rp ${formatNumber(grandBalance)}`, col2, finalY + 12);

                // 5. HALAMAN BARU KHUSUS UNTUK GRAFIK
                doc.addPage();
                let chartPageY = 20;

                // HEADER HALAMAN GRAFIK
                doc.setFontSize(16);
                doc.setFont(undefined, 'bold');

                // Cek apakah perlu halaman baru untuk grafik berikutnya
                if (chartPageY > 220) {
                    doc.addPage();
                    chartPageY = 20;
                }

                // GRAFIK 2: SALDO KUMULATIF
                const canvas2 = document.createElement('canvas');

                if (chartData.labels.length > 0) {
                    chartPageY = await renderChartToPDF(ctx2, {

        // ---------------------------------------------------------

        function loadJadwalRonda() {
            fetchAndParseCSV(csvUrls.ronda)
                .then(data => {
                    if (data.length <= 1) return;
                    rawRondaData = data;
                    const rondaPage = document.getElementById('rondaPage');
                    const tableContainer = rondaPage.querySelector('.table-container');
                    tableContainer.style.overflowX = "hidden";
                    tableContainer.innerHTML = '<div id="rondaVisualList" class="ronda-visual-container"></div>';
                    const listContainer = document.getElementById('rondaVisualList');

                    const headers = data[0];
                    const lastRondaIdx = headers.length - 1;

                    let rondaList = [];
                    for (let i = 1; i < data.length; i++) {
                        rondaList.push({
                            nama: data[i][0],
                            hariTerakhir: parseInt(data[i][lastRondaIdx]) || 0
                        });
                    }

                    rondaList.sort((a, b) => {
                        if (a.hariTerakhir === 0) return -1;
                        if (b.hariTerakhir === 0) return 1;
                        return b.hariTerakhir - a.hariTerakhir;
                    });

                    const maxHari = Math.max(...rondaList.map(item => item.hariTerakhir));

                    rondaList.forEach(item => {
                        let persentase, labelTeks, statusClass;
                        if (item.hariTerakhir === 0) {
                            persentase = 100;
                            labelTeks = "DIPILIH RONDA";
                            statusClass = "status-ronda";
                        } else {
                            persentase = maxHari > 0 ? (item.hariTerakhir / maxHari) * 100 : 0;
                            labelTeks = `Sudah ${item.hariTerakhir} hari tidak ronda`;
                            statusClass = "";
                        }

                        const itemHtml = `
                            <div class="ronda-item ${statusClass}">
                                <div class="ronda-info">
                                    <span class="ronda-name">${item.nama}</span>
                                    <span class="ronda-days">${item.hariTerakhir === 0 ? 'Aktif Malam Ini' : item.hariTerakhir + ' Hari'}</span>
                                </div>
                                <div class="ronda-bar-bg">
                                    <div class="ronda-bar-fill" style="width: ${persentase}%"></div>
                                    <div class="ronda-bar-text">${labelTeks}</div>
                                </div>
                            </div>`;
                        listContainer.insertAdjacentHTML('beforeend', itemHtml);
                    });
                    updateLastUpdateTime();
                })
                .finally(() => showLoading(false));
        }

        async function exportRondaPDF() {
            if (rawRondaData.length <= 1) return showToast("Data ronda belum dimuat!", "error");
            showLoading(true);
            
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('p', 'mm', 'a4');
                
                doc.setFontSize(20);
                doc.setFont(undefined, 'bold');
                doc.text("REKAP RONDA 2026", 105, 15, { align: 'center' });
                
                doc.setFontSize(12);
                doc.setFont(undefined, 'normal');
                doc.text(`System Management Gang Murai - Dicetak: ${moment().format('DD MMMM YYYY HH:mm')}`, 105, 22, { align: 'center' });
                
                const headers = rawRondaData[0];
                const dataRows = rawRondaData.slice(1);
                
                const bulanIndonesia = [
                    'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
                    'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'
                ];
                
                const rekapData = {};
                
                dataRows.forEach(row => {
                    const namaWarga = row[0];
                    if (!namaWarga || namaWarga.trim() === '') return;
                    
                    const nama = namaWarga.trim();
                    rekapData[nama] = {
                        nama: nama,
                        perBulan: {},
                        total: 0
                    };
                    
                    bulanIndonesia.forEach(bulan => {
                        rekapData[nama].perBulan[bulan] = 0;
                    });
                });
                
                const dateHeaders = headers.slice(1);
                let totalKehadiranTerhitung = 0;
                
                dateHeaders.forEach((tanggalStr, colIndex) => {
                    let bulan = '';
                    let tanggalMoment = null;
                    
                    tanggalMoment = moment(tanggalStr, 'DD/MM/YYYY');
                    if (!tanggalMoment.isValid()) tanggalMoment = moment(tanggalStr, 'DD-MM-YYYY');
                    if (!tanggalMoment.isValid()) tanggalMoment = moment(tanggalStr, 'YYYY-MM-DD');
                    if (!tanggalMoment.isValid()) tanggalMoment = moment(tanggalStr);
                    
                    if (tanggalMoment.isValid()) {
                        const bulanIndex = tanggalMoment.month();
                        if (bulanIndex >= 0 && bulanIndex < 12) bulan = bulanIndonesia[bulanIndex];
                    } else {
                        const lowerStr = tanggalStr.toLowerCase();
                        bulanIndonesia.forEach((bulanName, idx) => {
                            if (lowerStr.includes(bulanName.toLowerCase())) bulan = bulanName;
                        });
                    }
                    
                    if (!bulan) return;
                    
                    dataRows.forEach((row) => {
                        const namaWarga = row[0];
                        if (!namaWarga || !rekapData[namaWarga]) return;
                        
                        const statusRonda = row[colIndex + 1];
                        const statusStr = statusRonda ? statusRonda.toString().toUpperCase().trim() : '';
                        
                        const isHadir = statusStr === 'TRUE' || statusStr === 'YA' || statusStr === '1' || statusStr === '✓' || statusStr === 'X' || statusStr === 'V';
                        
                        if (isHadir) {
                            rekapData[namaWarga].perBulan[bulan] = (rekapData[namaWarga].perBulan[bulan] || 0) + 1;
                            rekapData[namaWarga].total += 1;
                            totalKehadiranTerhitung++;
                        }
                    });
                });
                
                const rekapArray = Object.values(rekapData);
                const tableHeaders = ['No', 'Nama Warga', ...bulanIndonesia, 'Total'];
                const tableData = rekapArray
                    .filter(warga => warga.nama && warga.nama.trim() !== '')
                    .map((warga, index) => {
                        const rowData = [index + 1, warga.nama];
                        bulanIndonesia.forEach(bulan => rowData.push(warga.perBulan[bulan] || 0));
                        rowData.push(warga.total);
                        return rowData;
                    });
                
                if (tableData.length === 0 || totalKehadiranTerhitung === 0) {
                    doc.setFontSize(14);
                    doc.text("Tidak ada data kehadiran ronda ditemukan.", 20, 40);
                } else {
                    tableData.sort((a, b) => b[b.length - 1] - a[a.length - 1]);
                    tableData.forEach((row, index) => row[0] = index + 1);
                    
                    const margin = 6;
                    const noColWidth = 8; const namaColWidth = 35; const bulanColWidth = 7; const totalColWidth = 12;
                    
                    doc.autoTable({
                        startY: 35,
                        head: [tableHeaders],
                        body: tableData,
                        theme: 'grid',
                        headStyles: { 
                            fillColor: [67, 97, 238], 
                            textColor: [255, 255, 255], // Putih
                            fontSize: 6, 
                            halign: 'center',
                            fontStyle: 'bold',
                            cellPadding: 1.5
                        },
                        bodyStyles: { fontSize: 6, cellPadding: 1.5, textColor: [0, 0, 0] },
                        columnStyles: {
                            0: { cellWidth: noColWidth, halign: 'center' },
                            1: { cellWidth: namaColWidth, halign: 'left' },
                            ...bulanIndonesia.reduce((styles, _, i) => { styles[i + 2] = { cellWidth: bulanColWidth, halign: 'center' }; return styles; }, {}),
                            [tableHeaders.length - 1]: { cellWidth: totalColWidth, halign: 'center', fontStyle: 'bold' }
                        },
                        margin: { left: margin, right: margin }
                    });
                }
                
                doc.save(`Rekap_Ronda_EMurai_${moment().format('YYYYMMDD_HHmm')}.pdf`);
                showToast("Jadwal Ronda PDF berhasil diunduh!", "success");
                
            } catch (err) { 
                console.error(err);
                showToast("Gagal membuat PDF Ronda: " + err.message, "error"); 
            }
            finally { 
                showLoading(false); 
            }
        }
    </script>
</body>
</html>
