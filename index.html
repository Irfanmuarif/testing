<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-MURAI - Sistem Informasi Gang Perumahan</title>
    
    <!-- External Libraries (CDNs) -->
    <!-- Font untuk Glassmorphism (Italiana, DM Sans) -->
    <link href="https://fonts.googleapis.com/css2?family=Italiana&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font untuk Neon (Balsamiq Sans) -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:wght@700&display=swap" rel="stylesheet">
    <!-- Font Fallback (Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- JS Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <!-- CSS Styles (Optimized Glassmorphism + Neon Nav) -->
    <style>
        /* ==========================================================================
           OPTIMIZED LIQUID GLASS + NEON NAV
           ========================================================================== */
        
        :root {
            /* --- Glass Variables (Optimized) --- */
            --glass-white: rgba(255, 255, 255, 0.08);
            --glass-white-md: rgba(255, 255, 255, 0.12);
            --glass-white-lg: rgba(255, 255, 255, 0.18);
            
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-border-subtle: rgba(255, 255, 255, 0.05);

            /* Blur values: Dikurangi agar tidak lemot (16px -> 8px) */
            --blur-sm: blur(4px);
            --blur-md: blur(8px); 
            --blur-lg: blur(16px);

            --shadow-glass: 0 4px 16px rgba(0, 0, 0, 0.2);
            --shadow-float: 0 10px 30px rgba(0, 0, 0, 0.3);

            /* Accent Colors for general UI */
            --accent-aqua: #5ee7df;
            --accent-violet: #b490f5;
            --accent-rose: #f7a8c4;
            --accent-lime: #a8f08a;

            /* Base Theme */
            --color-bg: #0b0e1a;
            --color-text: #ffffff;
            --color-text-muted: rgba(255, 255, 255, 0.6);
            
            --border-radius-lg: 24px;
            --border-radius-full: 9999px;
        }

        /* Mencegah lag di HP dengan performa rendah */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'DM Sans', sans-serif;
            color: var(--color-text);
            background: var(--color-bg);
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
            transform: translateZ(0); /* Hardware Acceleration */
        }

        /* --- ANIMATED BACKGROUND (Optimized) --- */
        .scene {
            position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none;
        }
        .scene__blob {
            position: absolute; border-radius: 50%; 
            filter: blur(60px); /* Dikurangi dari 80px */
            opacity: 0.4;
            will-change: transform; /* Hint browser untuk optimasi */
            animation: blob-drift 25s ease-in-out infinite alternate;
        }
        .scene__blob--1 { width: 400px; height: 400px; background: radial-gradient(circle, var(--accent-aqua), transparent); top: -100px; left: -100px; }
        .scene__blob--2 { width: 500px; height: 500px; background: radial-gradient(circle, var(--accent-violet), transparent); bottom: -100px; right: -100px; animation-delay: -5s; }
        .scene__blob--3 { width: 300px; height: 300px; background: radial-gradient(circle, var(--accent-rose), transparent); top: 40%; left: 40%; animation-delay: -10s; }

        @keyframes blob-drift {
            0% { transform: translate3d(0, 0, 0) scale(1); }
            100% { transform: translate3d(30px, -30px, 0) scale(1.1); }
        }

        /* --- GLASS UTILITIES --- */
        .glass {
            backdrop-filter: var(--blur-md); 
            -webkit-backdrop-filter: var(--blur-md);
            background: var(--glass-white);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-glass);
            position: relative;
            contain: layout style paint; /* Optimasi Rendering Isolation */
        }

        /* --- LAYOUT --- */
        .app-container { max-width: 100%; min-height: 100vh; position: relative; display: flex; flex-direction: column; z-index: 1; }
        .screen { flex: 1; display: flex; flex-direction: column; }

        /* --- HEADER --- */
        .app-header {
            padding: 1rem 1.5rem; position: relative; z-index: 10;
            background: rgba(11, 14, 26, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border-subtle);
        }

        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo-section h1 {
            font-family: 'Italiana', serif; font-size: 1.4rem; font-weight: 400;
            background: linear-gradient(135deg, #fff, var(--accent-aqua)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .app-subtitle { font-size: 0.7rem; opacity: 0.6; letter-spacing: 0.05em; margin-top: -4px; }

        /* --- BUTTONS --- */
        .glass-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 8px 20px; border-radius: var(--border-radius-full); border: 1px solid var(--glass-border);
            background: var(--glass-white); color: var(--color-text); cursor: pointer;
            font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500;
            backdrop-filter: blur(4px);
            transition: transform 0.2s, background 0.2s;
        }
        .glass-btn:hover { transform: translateY(-2px); background: var(--glass-white-md); }
        .glass-btn:active { transform: scale(0.95); }
        
        .glass-btn--primary { border-color: var(--accent-aqua); color: var(--accent-aqua); background: rgba(94, 231, 223, 0.1); }
        .glass-btn--primary:hover { background: rgba(94, 231, 223, 0.2); box-shadow: 0 0 15px rgba(94, 231, 223, 0.2); }
        .glass-btn--danger { border-color: var(--accent-rose); color: var(--accent-rose); background: rgba(247, 168, 196, 0.1); }
        .glass-btn--icon { width: 36px; height: 36px; padding: 0; border-radius: 50%; }
        .glass-btn--sm { padding: 4px 12px; font-size: 0.75rem; }

        /* --- NAVIGATION CONTAINER (Fixed Position) --- */
        .bottom-nav {
            display: flex; justify-content: center; align-items: center; gap: 15px; padding: 15px;
            
            /* Fix Posisi: Agar tidak hilang saat scroll */
            position: fixed;
            bottom: 30px; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999; /* Paling atas */
            
            width: auto; min-width: 320px; max-width: 90vw;
            
            /* Background Container Gelap agar Neon terlihat */
            background: rgba(10, 10, 20, 0.9); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px; /* Bentuk Kapsul */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- NAV ITEMS (Multi-Color Neon) --- */
        .nav-item {
            font-family: 'Balsamiq Sans', cursive;
            font-size: 1.1rem;
            font-weight: 700;
            
            display: inline-flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
            cursor: pointer; text-decoration: none;
            
            /* Warna Neon diambil dari atribut HTML style="..." */
            --current-neon: var(--neon-color, hsl(317 100% 54%)); 
            
            color: var(--current-neon);
            border: 0.15em solid var(--current-neon);
            padding: 0.4em 1em;
            border-radius: 0.25em;
            
            text-shadow: 0 0 0.125em hsl(0 0% 100% / 0.3), 0 0 0.45em currentColor;
            box-shadow: inset 0 0 0.5em 0 var(--current-neon), 0 0 0.5em 0 var(--current-neon);
            
            position: relative;
            background: transparent !important;
            backdrop-filter: none; -webkit-backdrop-filter: none;
            transition: all 0.2s ease-in-out;
            min-width: 70px;
        }

        /* Efek Cahaya Neon (Reflection) */
        .nav-item::before {
            pointer-events: none; content: ""; position: absolute;
            background: var(--current-neon);
            top: 120%; left: 0; width: 100%; height: 100%;
            transform: perspective(1em) rotateX(40deg) scale(1, 0.35);
            filter: blur(1em); opacity: 0.7; z-index: -1;
        }

        /* Efek Isi Warna saat Hover/Active */
        .nav-item::after {
            content: ""; position: absolute;
            top: 0; bottom: 0; left: 0; right: 0;
            box-shadow: 0 0 2em 0.5em var(--current-neon);
            opacity: 0;
            background-color: var(--current-neon);
            z-index: -1; transition: opacity 100ms linear;
            border-radius: inherit;
        }

        /* Hover & Active States */
        .nav-item:hover, .nav-item:focus, .nav-item.active {
            color: #050505; /* Teks hitam saat neon menyala */
            text-shadow: none;
            transform: translateY(-3px);
        }
        .nav-item:hover::before, .nav-item:focus::before, .nav-item.active::before { opacity: 1; }
        .nav-item:hover::after, .nav-item:focus::after, .nav-item.active::after { opacity: 1; }
        
        .nav-item i { font-size: 1.4rem; margin-bottom: 2px; }

        /* --- CONTENT AREA --- */
        .content {
            flex: 1; padding: 20px; padding-bottom: 100px;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
            max-width: 1000px; margin: 0 auto; width: 100%;
        }
        .page { display: none; animation: fadeIn 0.3s ease-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- CARDS --- */
        .card-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border); border-radius: var(--border-radius-lg);
            padding: 20px; position: relative; overflow: hidden;
            transition: transform 0.2s ease, border-color 0.2s ease;
            will-change: transform; contain: layout style;
        }

        .card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.2); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 10px; }
        .card-title { font-family: 'Italiana', serif; font-size: 1.2rem; font-weight: 700; color: #fff; }
        .card-date { font-size: 0.7rem; padding: 4px 10px; border-radius: 12px; background: rgba(255,255,255,0.1); color: var(--color-text-muted); }
        .card-content { font-size: 0.9rem; color: var(--color-text-muted); line-height: 1.5; margin-bottom: 16px; }
        .card-footer { display: flex; justify-content: space-between; padding-top: 12px; border-top: 1px solid var(--glass-border-subtle); font-size: 0.8rem; color: var(--color-text-muted); }

        /* --- TABLES (Optimized - No Blur on Rows) --- */
        .table-container {
            width: 100%; overflow-x: auto; border-radius: 16px;
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.3);
            margin-top: 10px;
        }

        .data-table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 600px; }
        .data-table thead { position: sticky; top: 0; z-index: 5; }
        .data-table th {
            background: rgba(11, 14, 26, 0.95); color: var(--accent-aqua); font-weight: 600; padding: 12px 16px;
            text-align: left; border-bottom: 2px solid var(--accent-aqua);
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em;
            backdrop-filter: blur(10px);
        }
        .data-table td {
            padding: 12px 16px; border-bottom: 1px solid var(--glass-border-subtle);
            color: #eee; font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.01); /* Solid Transparent */
            transition: background 0.2s;
        }
        .data-table tr:hover td { background: rgba(255, 255, 255, 0.05); }
        .data-table tbody tr:last-child td { border-bottom: none; }

        /* --- STATS GRID --- */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }

        .stat-card {
            background: var(--glass-white); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: 16px; padding: 16px;
            display: flex; align-items: center; gap: 12px; transition: transform 0.2s;
        }
        .stat-card:hover { transform: scale(1.02); }

        .stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; background: rgba(255,255,255,0.1); }
        .total .stat-icon { color: var(--accent-aqua); background: rgba(94, 231, 223, 0.15); }
        .income .stat-icon { color: var(--accent-lime); background: rgba(168, 240, 138, 0.15); }
        .expense .stat-icon { color: var(--accent-rose); background: rgba(247, 168, 196, 0.15); }
        .stat-info { display: flex; flex-direction: column; }
        .stat-info span { font-size: 0.7rem; color: var(--color-text-muted); text-transform: uppercase; }
        .stat-info h3 { font-size: 1.1rem; font-weight: 700; color: #fff; }

        /* --- ACCORDION --- */
        .month-accordion {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border);
            border-radius: 16px; margin-bottom: 12px; overflow: hidden;
        }

        .accordion-header { padding: 16px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
        .accordion-header:hover { background: rgba(255,255,255,0.05); }
        .month-accordion.active .accordion-header { background: rgba(94, 231, 223, 0.05); border-bottom: 1px solid var(--glass-border-subtle); }
        .acc-left { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 1rem; }
        .acc-left i { color: var(--accent-aqua); }
        .accordion-content { padding: 0; max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .month-accordion.active .accordion-content { max-height: 2000px; }
        .accordion-content .table-container { margin: 0; border: none; background: transparent; box-shadow: none; }

        /* --- RONDA VISUALIZATION --- */
        .ronda-visual-container { display: flex; flex-direction: column; gap: 16px; padding: 4px; }
        .ronda-item {
            background: var(--glass-white); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: 16px;
            padding: 16px; display: flex; align-items: center; gap: 16px;
            transition: transform 0.2s;
        }
        .ronda-item:hover { transform: translateX(5px); border-color: var(--accent-violet); }
        .ronda-item.status-ronda { border-color: var(--accent-lime); background: rgba(168, 240, 138, 0.05); }
        .ronda-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid var(--glass-border); }
        .ronda-bar-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 8px; }
        .ronda-bar-fill {
            height: 100%; border-radius: 10px;
            background: linear-gradient(90deg, var(--accent-violet), var(--accent-aqua));
            box-shadow: 0 0 10px rgba(180, 144, 245, 0.5);
            transition: width 0.5s ease-out;
        }
        .status-ronda .ronda-bar-fill { background: linear-gradient(90deg, var(--accent-lime), #86efac); box-shadow: 0 0 10px rgba(168, 240, 138, 0.5); }
        .ronda-bar-text { position: absolute; top: 24px; left: 80px; font-size: 0.7rem; color: var(--color-text-muted); }

        /* --- MODAL --- */
        .pdf-modal {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: opacity 0.3s ease; padding: 20px;
        }
        .pdf-modal.active { opacity: 1; visibility: visible; }
        .pdf-paper {
            background: #fff; color: #1e293b; width: 100%; max-width: 800px;
            max-height: 90vh; overflow-y: auto; border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); padding: 40px;
            transform: translateY(20px); transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        .pdf-modal.active .pdf-paper { transform: translateY(0); }
        .close-modal { position: absolute; top: 15px; right: 20px; background: rgba(0,0,0,0.1); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }
        
        .pdf-header { text-align: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 30px; }
        .pdf-title { font-family: 'Italiana', serif; font-size: 1.8rem; color: #0f172a; margin-bottom: 5px; }
        .pdf-meta { color: #64748b; font-size: 0.9rem; display: flex; justify-content: center; gap: 20px; font-style: italic; }
        .pdf-content { font-family: 'DM Sans', sans-serif; font-size: 1.1rem; line-height: 1.8; color: #334155; }
        .pdf-content p { margin-bottom: 1.2em; }

        /* --- UTILS --- */
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; }
        .badge-in { background: rgba(168, 240, 138, 0.2); color: var(--accent-lime); border: 1px solid rgba(168, 240, 138, 0.3); }
        .badge-out { background: rgba(247, 168, 196, 0.2); color: var(--accent-rose); border: 1px solid rgba(247, 168, 196, 0.3); }
        
        .text-primary { color: var(--accent-aqua) !important; }
        .text-right { text-align: right; }
        .hidden { display: none !important; }

        .alert-iuran-info {
            background: rgba(94, 231, 223, 0.1); border-left: 4px solid var(--accent-aqua);
            color: var(--accent-aqua); padding: 12px; border-radius: 8px;
            margin-bottom: 16px; font-size: 0.85rem; display: flex; align-items: center; gap: 10px;
        }

        .loading-indicator {
            position: fixed; inset: 0; background: rgba(11, 14, 26, 0.9);
            backdrop-filter: blur(5px); z-index: 2000; display: flex; justify-content: center; align-items: center;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(94, 231, 223, 0.1);
            border-radius: 50%; border-top-color: var(--accent-aqua); animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        input[type="checkbox"] {
            width: 18px; height: 18px; appearance: none; background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border); border-radius: 4px; cursor: pointer; position: relative;
        }
        input[type="checkbox"]:checked { background: var(--accent-lime); border-color: var(--accent-lime); }
        input[type="checkbox"]:checked::before {
            content: '✓'; position: absolute; color: #000; font-size: 12px; font-weight: bold;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="scene">
        <div class="scene__blob scene__blob--1"></div>
        <div class="scene__blob scene__blob--2"></div>
        <div class="scene__blob scene__blob--3"></div>
    </div>

    <div class="app-container">
        <!-- Main App Screen -->
        <div id="mainScreen" class="screen">
            <header class="app-header">
                <div class="header-content">
                    <div class="logo-section">
                        <h1><i class="fas fa-home"></i> E-MURAI</h1>
                        <p class="app-subtitle">System Management Gang Murai</p>
                    </div>
                    <div class="refresh-info">
                        <span id="lastUpdate" class="hidden">Last update: -</span>
                        <button id="refreshBtn" class="glass-btn glass-btn--icon glass-btn--sm" style="background: rgba(255,255,255,0.05);">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                </div>
            </header>

            <nav class="bottom-nav">
                <!-- 1. PENGUMUMAN: WARNA PUTIH NEON -->
                <button class="nav-item active" data-page="pengumuman" style="--neon-color: hsl(0, 0%, 100%);">
                    <i class="fas fa-bullhorn"></i>
                    <span>Pengumuman</span>
                </button>

                <!-- 2. IURAN: WARNA BIRU TOSCA -->
                <button class="nav-item" data-page="iuran" style="--neon-color: hsl(195, 100%, 50%);">
                    <i class="fas fa-money-bill-wave"></i>
                    <span>Iuran</span>
                </button>

                <!-- 3. UANG KAS: WARNA HIJAU TOSCA -->
                <button class="nav-item" data-page="kas" style="--neon-color: hsl(165, 100%, 50%);">
                    <i class="fas fa-wallet"></i>
                    <span>Keuangan</span>
                </button>

                <!-- 4. RONDA: WARNA PINK -->
                <button class="nav-item" data-page="ronda" style="--neon-color: hsl(317 100% 54%);">
                    <i class="fas fa-shield-alt"></i>
                    <span>Ronda</span>
                </button>
            </nav>

            <main class="content">
                <!-- Pengumuman Page -->
                <div id="pengumumanPage" class="page active">
                    <div class="page-header" style="margin-bottom: 20px;">
                        <h2 style="font-family: 'Italiana', serif; font-size: 1.8rem; color: var(--color-text);">Pengumuman Terbaru</h2>
                    </div>
                    <div id="pengumumanList" class="card-container">
                        <!-- Pengumuman items will be loaded here -->
                    </div>
                </div>

                <!-- Iuran Bulanan Page -->
                <div id="iuranPage" class="page">
                    <div class="page-header" style="margin-bottom: 20px;">
                        <h2 style="font-family: 'Italiana', serif; font-size: 1.8rem; color: var(--color-text);">Data Iuran Warga</h2>
                    </div>
                    <div class="table-container">
                        <table id="iuranTable" class="data-table">
                            <!-- Iuran table will be loaded here -->
                        </table>
                    </div>
                </div>

                <!-- Uang Kas Page -->
                <div id="kasPage" class="page">
                    <div class="page-header" style="flex-direction: column; align-items: flex-start; gap: 20px; margin-bottom: 20px;">
                        <h2 style="font-family: 'Italiana', serif; font-size: 1.8rem; color: var(--color-text);">Dashboard Keuangan</h2>
                        <div class="btn-group">
                            <button onclick="exportToExcel()" class="glass-btn">
                                <i class="fas fa-file-excel"></i> Excel
                            </button>
                            <button onclick="exportToPDF()" class="glass-btn glass-btn--primary">
                                <i class="fas fa-file-pdf"></i> PDF Laporan
                            </button>
                        </div>
                    </div>
                
                    <div class="stats-grid">
                        <div class="stat-card total">
                            <div class="stat-icon"><i class="fas fa-wallet"></i></div>
                            <div class="stat-info">
                                <span>Total Saldo</span>
                                <h3 id="statTotalSaldo">Rp 0</h3>
                            </div>
                        </div>
                        <div class="stat-card income">
                            <div class="stat-icon"><i class="fas fa-arrow-down"></i></div>
                            <div class="stat-info">
                                <span>Masuk (Ini)</span>
                                <h3 id="statTotalMasuk">Rp 0</h3>
                            </div>
                        </div>
                        <div class="stat-card expense">
                            <div class="stat-icon"><i class="fas fa-arrow-up"></i></div>
                            <div class="stat-info">
                                <span>Keluar (Ini)</span>
                                <h3 id="statTotalKeluar">Rp 0</h3>
                            </div>
                        </div>
                    </div>
                
                    <div id="kasContainer">
                        <!-- Kas data will be loaded here -->
                    </div>
                </div>

                <!-- Jadwal Ronda Page -->
                <div id="rondaPage" class="page">
                    <div class="page-header" style="margin-bottom: 20px;">
                        <h2 style="font-family: 'Italiana', serif; font-size: 1.8rem; color: var(--color-text);">Jadwal & Status Ronda</h2>
                        <button onclick="exportRondaPDF()" class="glass-btn glass-btn--primary glass-btn--sm">
                            <i class="fas fa-file-pdf"></i> Download
                        </button>
                    </div>
                    <div class="table-container">
                        <!-- Ronda data will be loaded here -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- PDF-like Modal for Pengumuman -->
    <div id="pdfModal" class="pdf-modal">
        <div class="pdf-paper">
            <button class="close-modal" onclick="closePdfModal()">
                <i class="fas fa-times"></i>
            </button>
            <div id="pdfBody">
                <!-- Content injected via JS -->
            </div>
        </div>
    </div>

    <!-- Loading indicator -->
    <div id="loadingIndicator" class="loading-indicator hidden">
        <div class="spinner"></div>
    </div>

    <!-- JavaScript Logic (ORIGINAL - TIDAK DIUBAH) -->
    <script>
        // Global variables
        const csvUrls = {
            pengumuman: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRhtHQT_YmSq-tiQt-6Kqj5Ms9oeUdTdiNIChEdQPgEQryYxTMf2M5RTgpVa1oi30rvvXrJK3XY4nyd/pub?gid=0&single=true&output=csv',
            iuran: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRhtHQT_YmSq-tiQt-6Kqj5Ms9oeUdTdiNIChEdQPgEQryYxTMf2M5RTgpVa1oi30rvvXrJK3XY4nyd/pub?gid=1650144415&single=true&output=csv',
            kas: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRhtHQT_YmSq-tiQt-6Kqj5Ms9oeUdTdiNIChEdQPgEQryYxTMf2M5RTgpVa1oi30rvvXrJK3XY4nyd/pub?gid=2139823991&single=true&output=csv',
            ronda: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRhtHQT_YmSq-tiQt-6Kqj5Ms9oeUdTdiNIChEdQPgEQryYxTMf2M5RTgpVa1oi30rvvXrJK3XY4nyd/pub?gid=2068778061&single=true&output=csv'
        };

        // Variabel Penampung Data Global
        let rawKasData = []; 
        let rawRondaData = [];
        let kasDataForChart = []; 

        // DOM elements
        const refreshBtn = document.getElementById('refreshBtn');
        const lastUpdate = document.getElementById('lastUpdate');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const navItems = document.querySelectorAll('.nav-item');
        const pages = document.querySelectorAll('.page');

        // Containers
        const pengumumanList = document.getElementById('pengumumanList');
        const iuranTable = document.getElementById('iuranTable');
        const kasContainer = document.getElementById('kasContainer');
        const pdfModal = document.getElementById('pdfModal');
        const pdfBody = document.getElementById('pdfBody');

        document.addEventListener('DOMContentLoaded', () => {
            refreshBtn.addEventListener('click', refreshAllData);
            navItems.forEach(item => {
                item.addEventListener('click', () => switchPage(item.getAttribute('data-page')));
            });
            // Close modal when clicking outside paper
            pdfModal.addEventListener('click', (e) => {
                if(e.target === pdfModal) closePdfModal();
            });
            loadInitialData();
            setInterval(refreshAllData, 5 * 60 * 1000); 
        });

        function switchPage(pageName) {
            navItems.forEach(item => item.classList.toggle('active', item.getAttribute('data-page') === pageName));
            pages.forEach(page => page.classList.toggle('active', page.id === `${pageName}Page`));
            loadPageData(pageName);
        }

        function loadInitialData() {
            refreshAllData();
        }

        function refreshAllData() {
            const activePageElement = document.querySelector('.page.active');
            if (activePageElement) {
                const activePage = activePageElement.id.replace('Page', '');
                loadPageData(activePage);
            }
        }

        function loadPageData(pageName) {
            showLoading(true);
            switch (pageName) {
                case 'pengumuman': loadPengumuman(); break;
                case 'iuran': loadIuranBulanan(); break;
                case 'kas': loadUangKas(); break;
                case 'ronda': loadJadwalRonda(); break;
            }
        }

        function fetchAndParseCSV(url) {
            const buster = `${url}&t=${new Date().getTime()}`;
            return new Promise((resolve, reject) => {
                fetch(buster)
                    .then(res => res.text())
                    .then(csvText => {
                        const results = Papa.parse(csvText, { header: false, skipEmptyLines: true });
                        resolve(results.data);
                    })
                    .catch(err => reject(err));
            });
        }

        function showLoading(show) {
            if (loadingIndicator) loadingIndicator.classList.toggle('hidden', !show);
        }

        function updateLastUpdateTime() {
            if (lastUpdate) lastUpdate.textContent = `Update: ${moment().format('HH:mm')}`;
        }

        function formatNumber(n) { 
            return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); 
        }

        function truncateText(text, maxLength = 100) {
            if (!text) return '';
            if (text.length <= maxLength) return text;
            return text.substring(0, maxLength) + '...';
        }

        // ---------------------------------------------------------
        // 1. PENGUMUMAN (UPDATED MODAL & SPACING)
        // ---------------------------------------------------------
        function loadPengumuman() {
            fetchAndParseCSV(csvUrls.pengumuman)
                .then(data => {
                    pengumumanList.innerHTML = '';
                    if (data.length <= 1) { 
                        pengumumanList.innerHTML = '<p class="text-center">Tidak ada pengumuman.</p>'; 
                        return; 
                    }
                    
                    // Loop backwards to show newest first
                    for (let i = data.length - 1; i >= 1; i--) {
                        const row = data[i];
                        const [id, tgl, judul, isi, pengirim] = row;
                        
                        // Simple strip tags for preview if needed, but here just raw text
                        const preview = truncateText(isi, 120);
                        
                        const card = document.createElement('div');
                        card.className = 'card pengumuman-card';
                        
                        // Click event directly on card to open modal
                        card.onclick = () => openPdfModal(judul, tgl, isi, pengirim);

                        card.innerHTML = `
                            <div class="card-header pengumuman-header">
                                <div class="pengumuman-header-content">
                                    <h3 class="card-title">${judul || 'Tanpa Judul'}</h3>
                                    <span class="card-date">${moment(tgl).format('DD MMMM YYYY')}</span>
                                </div>
                                <i class="fas fa-external-link-alt" style="color:var(--accent-aqua)"></i>
                            </div>
                            <div class="card-content">
                                ${preview}
                            </div>
                            <div class="card-footer">
                                <span>Oleh: ${pengirim || 'Admin'}</span>
                                <span class="text-primary">Baca Selengkapnya</span>
                            </div>`;
                        pengumumanList.appendChild(card);
                    }
                    updateLastUpdateTime();
                })
                .finally(() => showLoading(false));
        }

        // Fungsi untuk memformat teks agar "Enter" terlihat sebagai paragraf
        function formatTextToParagraphs(text) {
            if (!text) return '<p>Konten kosong.</p>';
            
            // 1. Ganti double newline (\n\n) dengan penanda paragraf baru
            // 2. Ganti single newline (\n) dengan <br> untuk soft break dalam paragraf
            // 3. Bungkus semuanya dalam tag <p>
            
            const paragraphs = text.split(/\n\s*\n/); // Pisahkan berdasarkan baris kosong
            return paragraphs.map(para => {
                // Hapus spasi berlebih di awal/akhir paragraf
                const cleanPara = para.trim();
                if(!cleanPara) return '';
                // Ganti sisa \n dengan <br> untuk baris baru dalam paragraf yang sama
                const formattedPara = cleanPara.replace(/\n/g, '<br>');
                return `<p>${formattedPara}</p>`;
            }).join('');
        }

        function openPdfModal(judul, tgl, isi, pengirim) {
            const formattedContent = formatTextToParagraphs(isi);
            
            const html = `
                <div class="pdf-header">
                    <div class="pdf-title">${judul || 'Pengumuman'}</div>
                    <div class="pdf-meta">
                        <span><i class="far fa-calendar-alt"></i> ${moment(tgl).format('dddd, DD MMMM YYYY')}</span>
                        <span><i class="far fa-user"></i> ${pengirim || 'Admin'}</span>
                    </div>
                </div>
                <div class="pdf-content">
                    ${formattedContent}
                </div>
                <div class="pdf-footer">
                    <small>Generated by E-MURAI System</small>
                </div>
            `;
            
            pdfBody.innerHTML = html;
            pdfModal.classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
        }

        function closePdfModal() {
            pdfModal.classList.remove('active');
            document.body.style.overflow = ''; // Restore scrolling
        }

        // ---------------------------------------------------------
        // 2. IURAN BULANAN
        // ---------------------------------------------------------
        function loadIuranBulanan() {
            fetchAndParseCSV(csvUrls.iuran)
                .then(data => {
                    if (data.length === 0) return;
                    const headers = data[0];
                    let html = `<thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>`;
                    
                    for (let i = 1; i < data.length; i++) {
                        if (!data[i][0]) continue;
                        html += '<tr>';
                        for (let j = 0; j < headers.length; j++) {
                            const val = (data[i][j] || "").toString().trim().toUpperCase();
                            if (val === 'TRUE' || val === 'FALSE') {
                                html += `<td class="text-center">
                                    <div class="checkbox-container">
                                        <input type="checkbox" ${val === 'TRUE' ? 'checked' : ''} disabled>
                                    </div>
                                </td>`;
                            } else {
                                html += `<td>${data[i][j] || '-'}</td>`;
                            }
                        }
                        html += '</tr>';
                    }
                    iuranTable.innerHTML = html + '</tbody>';
                    updateLastUpdateTime();
                })
                .finally(() => showLoading(false));
        }

        // ---------------------------------------------------------
        // 3. UANG KAS
        // ---------------------------------------------------------
        function loadUangKas() {
            fetchAndParseCSV(csvUrls.kas)
                .then(data => {
                    rawKasData = data; 
                    renderUangKas(data);
                    updateLastUpdateTime();
                })
                .finally(() => showLoading(false));
        }

        function renderUangKas(data) {
            kasContainer.innerHTML = '';
            if (!data || data.length <= 1) {
                kasContainer.innerHTML = '<p class="text-center">Data kas tidak ditemukan.</p>';
                return;
            }
        
            const bulanData = {};
            
            for (let i = 1; i < data.length; i++) {
                const row = data[i];
                if (!row[1]) continue;
                
                const masuk = parseInt(row[4]?.toString().replace(/[^0-9]/g, "")) || 0;
                const keluar = parseInt(row[5]?.toString().replace(/[^0-9]/g, "")) || 0;
                const saldoTransaksi = masuk - keluar;
                
                const transaksi = {
                    bulan: row[1],
                    tgl: row[2],
                    ket: row[3] || '',
                    masuk,
                    keluar,
                    saldoTransaksi
                };
                
                if (!bulanData[row[1]]) {
                    bulanData[row[1]] = {
                        namaBulan: row[1],
                        transaksi: [],
                        totalMasuk: 0,
                        totalKeluar: 0,
                        saldoBulan: 0
                    };
                }
                
                bulanData[row[1]].transaksi.push(transaksi);
                bulanData[row[1]].totalMasuk += masuk;
                bulanData[row[1]].totalKeluar += keluar;
                bulanData[row[1]].saldoBulan += saldoTransaksi;
            }
            
            const urutanBulan = {
                'Januari': 1, 'Februari': 2, 'Maret': 3, 'April': 4, 'Mei': 5, 'Juni': 6,
                'Juli': 7, 'Agustus': 8, 'September': 9, 'Oktober': 10, 'November': 11, 'Desember': 12
            };
            
            const sortedBulanKeys = Object.keys(bulanData).sort((a, b) => urutanBulan[a] - urutanBulan[b]);
            
            let saldoKumulatifHinggaSekarang = 0;
            const bulanDenganSaldoKumulatif = [];
            kasDataForChart = [];
            
            for (const bulanKey of sortedBulanKeys) {
                const bulan = bulanData[bulanKey];
                saldoKumulatifHinggaSekarang += bulan.saldoBulan;
                
                bulanDenganSaldoKumulatif.push({
                    ...bulan,
                    saldoKumulatif: saldoKumulatifHinggaSekarang
                });
                
                kasDataForChart.push({
                    bulan: bulanKey,
                    pemasukan: bulan.totalMasuk,
                    pengeluaran: bulan.totalKeluar,
                    saldoKumulatif: saldoKumulatifHinggaSekarang
                });
            }
            
            const bulanTerbaru = sortedBulanKeys[sortedBulanKeys.length - 1];
            const currentMonthIn = bulanTerbaru ? bulanData[bulanTerbaru].totalMasuk : 0;
            const currentMonthOut = bulanTerbaru ? bulanData[bulanTerbaru].totalKeluar : 0;
            
            document.getElementById('statTotalSaldo').innerText = `Rp ${formatNumber(saldoKumulatifHinggaSekarang)}`;
            document.getElementById('statTotalMasuk').innerText = `Rp ${formatNumber(currentMonthIn)}`;
            document.getElementById('statTotalKeluar').innerText = `Rp ${formatNumber(currentMonthOut)}`;
            
            const saldoSebelumBulan = {};
            let saldoSebelum = 0;
            
            for (const bulanKey of sortedBulanKeys) {
                saldoSebelumBulan[bulanKey] = saldoSebelum;
                saldoSebelum += bulanData[bulanKey].saldoBulan;
            }
            
            bulanDenganSaldoKumulatif.reverse().forEach((bulanDataItem, idx) => {
                let saldoBerjalan = saldoSebelumBulan[bulanDataItem.namaBulan];
                
                const isIuranInputted = bulanDataItem.transaksi.some(t => 
                    t.masuk > 0 && t.ket.toLowerCase().includes('iuran bulanan blok')
                );
            
                let alertHtml = '';
                if (!isIuranInputted) {
                    alertHtml = `
                        <div class="alert-iuran-info">
                            <i class="fas fa-info-circle"></i>
                            <span>iuran bulan <strong>${bulanDataItem.namaBulan}</strong> sementara belum diinput, masih ada yang belum melakukan pembayaran, cek di menu iuran bulanan</span>
                        </div>
                    `;
                }
        
                const rowsHtml = bulanDataItem.transaksi.map(item => {
                    saldoBerjalan += (item.masuk - item.keluar);
                    
                    return `
                        <tr>
                            <td>${item.tgl}</td>
                            <td>${item.ket}</td>
                            <td><span class="badge ${item.masuk > 0 ? 'badge-in' : ''}">${item.masuk > 0 ? '+' + formatNumber(item.masuk) : '-'}</span></td>
                            <td><span class="badge ${item.keluar > 0 ? 'badge-out' : ''}">${item.keluar > 0 ? '-' + formatNumber(item.keluar) : '-'}</span></td>
                            <td class="text-right"><strong>${formatNumber(saldoBerjalan)}</strong></td>
                        </tr>`;
                }).join('');
                
                const totalBulanHtml = `
                    <tr class="total-row">
                        <td colspan="2" class="font-weight-bold text-right">TOTAL ${bulanDataItem.namaBulan.toUpperCase()}:</td>
                        <td class="font-weight-bold text-success">+${formatNumber(bulanDataItem.totalMasuk)}</td>
                        <td class="font-weight-bold text-danger">-${formatNumber(bulanDataItem.totalKeluar)}</td>
                        <td class="font-weight-bold text-right saldo-kumulatif">Rp ${formatNumber(bulanDataItem.saldoKumulatif)}</td>
                    </tr>
                `;
        
                const netBulan = bulanDataItem.saldoBulan; 
                const isPlus = netBulan >= 0;
                const warnaTeks = isPlus ? 'var(--accent-lime)' : 'var(--accent-rose)';
                const tanda = isPlus ? '+' : '-';
        
                const accDiv = document.createElement('div');
                accDiv.className = `month-accordion ${idx === 0 ? 'active' : ''}`;
                
                accDiv.innerHTML = `
                    <div class="accordion-header" onclick="toggleKasAccordion(this)">
                        <div class="acc-left">
                            <i class="fas fa-calendar-check"></i> 
                            <span class="month-name">${bulanDataItem.namaBulan}</span>
                        </div>
                        <div class="acc-right">
                            <span style="color: ${warnaTeks}; font-weight: 700; margin-right: 8px; font-size: 0.9rem;">
                                ${tanda} Rp ${formatNumber(Math.abs(netBulan))}
                            </span>
                            <i class="fas fa-chevron-down ml-10"></i>
                        </div>
                    </div>
                    <div class="accordion-content">
                        ${alertHtml}
                        <div class="table-container">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Tgl</th>
                                        <th>Keterangan</th>
                                        <th>Masuk</th>
                                        <th>Keluar</th>
                                        <th>Saldo Kumulatif</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${rowsHtml}
                                    ${totalBulanHtml}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
        
                kasContainer.appendChild(accDiv);
            });
        }

        function toggleKasAccordion(headerElement) {
            const accordion = headerElement.parentElement;
            const isActive = accordion.classList.contains('active');
            
            document.querySelectorAll('.month-accordion').forEach(acc => {
                acc.classList.remove('active');
            });
            
            if (!isActive) {
                accordion.classList.add('active');
            }
        }

        async function exportToPDF() {
            if (rawKasData.length <= 1) return alert("Data kas belum terisi!");
            showLoading(true);
            
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('p', 'mm', 'a4');
                
                doc.setFontSize(20);
                doc.setFont(undefined, 'bold');
                doc.setTextColor(0, 0, 0);
                doc.text("LAPORAN KAS E-MURAI", 105, 20, { align: 'center' });
                
                doc.setFontSize(12);
                doc.setFont(undefined, 'normal');
                doc.text(`System Management Gang Murai - Periode: ${moment().format('DD MMMM YYYY')}`, 105, 28, { align: 'center' });
                
                const grouped = {};
                for (let i = 1; i < rawKasData.length; i++) {
                    const bulan = rawKasData[i][1];
                    if (!grouped[bulan]) grouped[bulan] = [];
                    grouped[bulan].push(rawKasData[i]);
                }
                
                const urutanBulan = {
                    'Januari': 1, 'Februari': 2, 'Maret': 3, 'April': 4, 'Mei': 5, 'Juni': 6,
                    'Juli': 7, 'Agustus': 8, 'September': 9, 'Oktober': 10, 'November': 11, 'Desember': 12
                };
                
                const sortedMonths = Object.keys(grouped).sort((a, b) => urutanBulan[a] - urutanBulan[b]);

                const pageWidth = doc.internal.pageSize.width;
                const margin = 20;
                const contentWidth = pageWidth - (2 * margin);
                const totalColumns = 5;
                const equalColumnWidth = contentWidth / totalColumns - 5;

                const chartData = {
                    labels: [],
                    pemasukan: [],
                    pengeluaran: [],
                    saldo: [],
                    net: []
                };

                let tempGlobalBalance = 0;

                for (const bulan of sortedMonths) {
                    const rows = grouped[bulan];
                    let totalMasuk = 0;
                    let totalKeluar = 0;
                    
                    for (const r of rows) {
                        const vIn = parseInt(r[4]?.toString().replace(/[^0-9]/g, "")) || 0;
                        const vOut = parseInt(r[5]?.toString().replace(/[^0-9]/g, "")) || 0;
                        totalMasuk += vIn;
                        totalKeluar += vOut;
                    }

                    const netBulan = totalMasuk - totalKeluar;
                    tempGlobalBalance += netBulan;
                    
                    chartData.labels.push(bulan);
                    chartData.pemasukan.push(totalMasuk);
                    chartData.pengeluaran.push(totalKeluar);
                    chartData.saldo.push(tempGlobalBalance);
                    chartData.net.push(netBulan);
                }

                if (chartData.labels.length > 0) {
                    chartData.labels.shift();
                    chartData.pemasukan.shift();
                    chartData.pengeluaran.shift();
                    chartData.saldo.shift();
                    chartData.net.shift();
                }
                
                let globalBalance = 0; 
                let currentY = 40; 

                for (const bulan of sortedMonths) {
                    const rows = grouped[bulan];
                    let totalMasuk = 0;
                    let totalKeluar = 0;
                    
                    const rowData = rows.map(r => {
                        const vIn = parseInt(r[4]?.toString().replace(/[^0-9]/g, "")) || 0;
                        const vOut = parseInt(r[5]?.toString().replace(/[^0-9]/g, "")) || 0;
                        totalMasuk += vIn;
                        totalKeluar += vOut;
                        const saldoSebelum = globalBalance;
                        globalBalance += (vIn - vOut);
                        return {
                            tgl: r[2],
                            ket: r[3],
                            masuk: vIn,
                            keluar: vOut,
                            saldo: saldoSebelum + (vIn - vOut)
                        };
                    });
                    
                    if (currentY > 220) {
                        doc.addPage();
                        currentY = 20;
                    }
                    
                    doc.setFontSize(14);
                    doc.setFont(undefined, 'bold');
                    doc.setTextColor(0, 0, 0);
                    doc.text(`Rincian Bulan: ${bulan}`, margin, currentY);
                    currentY += 8;
                    
                    const tableData = rowData.map(r => [
                        r.tgl,
                        r.ket,
                        formatNumber(r.masuk),
                        formatNumber(r.keluar),
                        formatNumber(r.saldo)
                    ]);
                    
                    tableData.push([
                        '',
                        `TOTAL ${bulan.toUpperCase()}:`,
                        formatNumber(totalMasuk),
                        formatNumber(totalKeluar),
                        formatNumber(globalBalance)
                    ]);
                    
                    doc.autoTable({
                        startY: currentY,
                        head: [['Tanggal', 'Keterangan', 'Masuk', 'Keluar', 'Saldo Kumulatif']],
                        body: tableData,
                        theme: 'grid',
                        headStyles: { 
                            fillColor: [67, 97, 238], 
                            fontSize: 9,
                            textColor: [255, 255, 255],
                            halign: 'center',
                            fontStyle: 'bold'
                        },
                        bodyStyles: { 
                            fontSize: 8,
                            cellPadding: 3,
                            overflow: 'linebreak',
                            textColor: [0, 0, 0],
                            fontStyle: 'normal'
                        },
                        columnStyles: {

        function loadJadwalRonda() {
            fetchAndParseCSV(csvUrls.ronda)
                .then(data => {
                    if (data.length <= 1) return;
                    rawRondaData = data;
        
                    const rondaPage = document.getElementById('rondaPage');
                    const tableContainer = rondaPage.querySelector('.table-container');
                    tableContainer.style.overflowX = "hidden";
                    tableContainer.innerHTML = '<div id="rondaVisualList" class="ronda-visual-container"></div>';
                    const listContainer = document.getElementById('rondaVisualList');
        
                    const headers = data[0];
                    const lastRondaIdx = headers.length - 1;
        
                    let rondaList = [];
                    for (let i = 1; i < data.length; i++) {
                        const namaWarga = data[i][0];
                        const pathFoto = data[i][1] ? data[i][1].trim() : ''; 
                        const hariTerakhir = parseInt(data[i][lastRondaIdx]) || 0;
        
                        rondaList.push({
                            nama: namaWarga,
                            foto: pathFoto,
                            hariTerakhir: hariTerakhir
                        });
                    }
        
                    rondaList.sort((a, b) => {
                        if (a.hariTerakhir === 0) return -1;
                        if (b.hariTerakhir === 0) return 1;
                        return b.hariTerakhir - a.hariTerakhir;
                    });
        
                    const maxHari = Math.max(...rondaList.map(item => item.hariTerakhir));
        
                    rondaList.forEach(item => {
                        let persentase, labelTeks, statusClass;
        
                        if (item.hariTerakhir === 0) {
                            persentase = 100;
                            labelTeks = "DIPILIH RONDA";
                            statusClass = "status-ronda";
                        } else {
                            persentase = maxHari > 0 ? (item.hariTerakhir / maxHari) * 100 : 0;
                            labelTeks = `Sudah ${item.hariTerakhir} hari tidak ronda`;
                            statusClass = "";
                        }
        
                        let avatarUrl;
                        if (item.foto && item.foto !== '') {
                            avatarUrl = item.foto;
                        } else {
                            avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(item.nama)}&background=random&color=fff&size=128&bold=true`;
                        }
        
                        const itemHtml = `
                            <div class="ronda-item ${statusClass}">
                                <img src="${avatarUrl}" alt="${item.nama}" class="ronda-avatar" 
                                     onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(item.nama)}&background=random&color=fff&size=128';">
                                <div class="ronda-content-wrapper" style="flex:1; min-width:0;">
                                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                                        <span style="font-weight:700; font-size:1rem; color:var(--color-text)">${item.nama}</span>
                                        <span style="font-size:0.75rem; padding:4px 8px; border-radius:12px; background:rgba(255,255,255,0.1); color:var(--color-text-muted); border:1px solid var(--glass-border-subtle);">${item.hariTerakhir === 0 ? 'Aktif' : item.hariTerakhir + ' Hari'}</span>
                                    </div>
                                    <div class="ronda-bar-bg">
                                        <div class="ronda-bar-fill" style="width: ${persentase}%"></div>
                                        <div class="ronda-bar-text">${labelTeks}</div>
                                    </div>
                                </div>
                            </div>`;
                        listContainer.insertAdjacentHTML('beforeend', itemHtml);
                    });
                    updateLastUpdateTime();
                })
                .finally(() => showLoading(false));
        }

        async function exportRondaPDF() {
            if (rawRondaData.length <= 1) return alert("Data ronda belum dimuat!");
            showLoading(true);
            
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('p', 'mm', 'a4');
                const pageWidth = doc.internal.pageSize.width;
                
                doc.setFontSize(20);
                doc.setFont(undefined, 'bold');
                doc.text("REKAP RONDA 2026", pageWidth / 2, 15, { align: 'center' });
                
                doc.setFontSize(12);
                doc.setFont(undefined, 'normal');
                doc.text(`System Management Gang Murai - Dicetak: ${moment().format('DD MMMM YYYY HH:mm')}`, pageWidth / 2, 22, { align: 'center' });
                
                const headers = rawRondaData[0];
                const dataRows = rawRondaData.slice(1);
                
                const bulanIndonesia = [
                    'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
                    'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'
                ];
                
                const rekapData = {};
                
                dataRows.forEach(row => {
                    const namaWarga = row[0];
                    if (!namaWarga || namaWarga.trim() === '') return;
                    
                    const nama = namaWarga.trim();
                    rekapData[nama] = {
                        nama: nama,
                        perBulan: {},
                        total: 0
                    };
                    
                    bulanIndonesia.forEach(bulan => {
                        rekapData[nama].perBulan[bulan] = 0;
                    });
                });
                
                const dateHeaders = headers.slice(1);
                let totalKehadiranTerhitung = 0;
                
                dateHeaders.forEach((tanggalStr, colIndex) => {
                    let bulan = '';
                    let tanggalMoment = null;
                    
                    tanggalMoment = moment(tanggalStr, 'DD/MM/YYYY');
                    if (!tanggalMoment.isValid()) {
                        tanggalMoment = moment(tanggalStr, 'DD-MM-YYYY');
                    }
                    if (!tanggalMoment.isValid()) {
                        tanggalMoment = moment(tanggalStr, 'YYYY-MM-DD');
                    }
                    if (!tanggalMoment.isValid()) {
                        tanggalMoment = moment(tanggalStr);
                    }
                    
                    if (tanggalMoment.isValid()) {
                        const bulanIndex = tanggalMoment.month();
                        if (bulanIndex >= 0 && bulanIndex < 12) {
                            bulan = bulanIndonesia[bulanIndex];
                        }
                    } else {
                        const lowerStr = tanggalStr.toLowerCase();
                        bulanIndonesia.forEach((bulanName, idx) => {
                            if (lowerStr.includes(bulanName.toLowerCase())) {
                                bulan = bulanName;
                            }
                        });
                    }
                    
                    if (!bulan) return;
                    
                    dataRows.forEach((row, rowIndex) => {
                        const namaWarga = row[0];
                        if (!namaWarga || !rekapData[namaWarga]) return;
                        
                        const statusRonda = row[colIndex + 1];
                        const statusStr = statusRonda ? statusRonda.toString().toUpperCase().trim() : '';
                        
                        const isHadir = statusStr === 'TRUE' || 
                                       statusStr === 'YA' || 
                                       statusStr === '1' || 
                                       statusStr === '✓' ||
                                       statusStr === 'X' ||
                                       statusStr === 'V';
                        
                        if (isHadir) {
                            rekapData[namaWarga].perBulan[bulan] = (rekapData[namaWarga].perBulan[bulan] || 0) + 1;
                            rekapData[namaWarga].total += 1;
                            totalKehadiranTerhitung++;
                        }
                    });
                });
                
                const rekapArray = Object.values(rekapData);
                const tableHeaders = ['No', 'Nama Warga', ...bulanIndonesia, 'Total'];
                const tableData = rekapArray
                    .filter(warga => warga.nama && warga.nama.trim() !== '')

                        const rowData = [index + 1, warga.nama];
                        bulanIndonesia.forEach(bulan => {
                            rowData.push(warga.perBulan[bulan] || 0);
                        });
                        rowData.push(warga.total);
                        return rowData;

                            doc.setFont(undefined, 'bold');
                            doc.text(`JADWAL RONDA PER TANGGAL (lanjutan)`, pageWidth / 2, currentY, { align: 'center' });
                            currentY += 10;
                        }
                        
                        const wargaBertugas = [];
                        dataRows.forEach(row => {
                            const namaWarga = row[0];
                            if (!namaWarga) return;
                            
                            const colIndex = headers.indexOf(tanggalStr);
                            if (colIndex > 0) {
                                const statusRonda = row[colIndex];
                                const statusStr = statusRonda ? statusRonda.toString().toUpperCase().trim() : '';
                                
                                const isHadir = statusStr === 'TRUE' || 
                                               statusStr === 'YA' || 
                                               statusStr === '1' || 
                                               statusStr === '✓' ||
                                               statusStr === 'X' ||
                                               statusStr === 'V';
                                
                                if (isHadir) {
                                    wargaBertugas.push(namaWarga.trim());
                                }
                            }
                        });
                        
                        if (wargaBertugas.length > 0) {
                            let formattedDate = tanggalStr;
                            try {
                                const dateMoment = moment(tanggalStr, ['DD/MM/YYYY', 'DD-MM-YYYY', 'YYYY-MM-DD']);
                                if (dateMoment.isValid()) {
                                    formattedDate = dateMoment.format('dddd, DD MMMM YYYY');
                                }
                            } catch (e) {}
                            
                            doc.setFontSize(12);
                            doc.setFont(undefined, 'bold');
                            doc.text(`${formattedDate}:`, margin, currentY);
                            currentY += 6;
                            
                            doc.setFontSize(10);
                            doc.setFont(undefined, 'normal');
                            
                            wargaBertugas.forEach((nama, idx) => {
                                if (currentY < 280) {
                                    doc.text(`${idx + 1}. ${nama}`, margin + 10, currentY);
                                    currentY += 5;
                                }
                            });
                            
                            currentY += 4;
                            datesProcessed++;
                        }
                    });
                    
                    if (currentY < 270) {
                        currentY += 5;
                        doc.setFontSize(10);
                        doc.setFont(undefined, 'italic');
                        doc.text(`Total: ${datesProcessed} hari jadwal ronda tercatat`, margin, currentY);
                    }
                }
                
                const totalPages = doc.internal.getNumberOfPages();
                for (let i = 1; i <= totalPages; i++) {
                    doc.setPage(i);
                    doc.setFontSize(7);
                    doc.setFont(undefined, 'italic');
                    doc.setTextColor(150, 150, 150);
                    doc.text(`Halaman ${i} dari ${totalPages}`, pageWidth / 2, 285, { align: 'center' }); 
                    doc.text(`© System Management Gang Murai ${new Date().getFullYear()}`, pageWidth / 2, 290, { align: 'center' }); 
                }
                
                doc.save(`Rekap_Ronda_EMurai_${moment().format('YYYYMMDD_HHmm')}.pdf`);
                
            } catch (err) { 
                console.error("Error generating PDF:", err);
                alert("Gagal membuat PDF: " + err.message); 
            }
            finally { 
                showLoading(false); 
            }
        }
    </script>
</body>
</html>
